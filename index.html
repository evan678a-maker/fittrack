<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#0284c7">
<title>FitTrack</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',system-ui,sans-serif;background:#f0f9ff;min-height:100vh;min-height:100dvh;overflow-x:hidden;color:#0c4a6e}
.pages-wrap{display:flex;width:200vw;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.pages-wrap.on-cal{transform:translateX(-100vw)}
.page{width:100vw;min-height:100vh;min-height:100dvh;flex-shrink:0;background:linear-gradient(180deg,#dbeafe 0%,#e0f2fe 15%,#f0f9ff 40%,#f0f9ff 100%)}

.page-dots{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:90}
.page-dot{width:8px;height:8px;border-radius:50%;background:rgba(14,165,233,.25);transition:all .3s;cursor:pointer}
.page-dot.active{background:#0ea5e9;width:24px;border-radius:4px}

/* Calendar */
.cal-header{background:linear-gradient(135deg,#0284c7,#0ea5e9,#38bdf8);padding:20px 20px 24px;border-radius:0 0 28px 28px;box-shadow:0 8px 32px rgba(14,165,233,.25)}
.cal-header-top{display:flex;justify-content:space-between;align-items:center;padding-top:max(4px,env(safe-area-inset-top))}
.cal-title{font-weight:900;font-size:22px;color:#fff;letter-spacing:-.3px}
.cal-back{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);border-radius:14px;padding:8px 16px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;backdrop-filter:blur(8px)}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.cal-nav-btn{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);border-radius:12px;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.cal-month{font-weight:800;font-size:18px;color:#fff}
.cal-summary{display:flex;gap:8px;margin-top:14px}
.cal-sum-box{flex:1;background:rgba(255,255,255,.15);border-radius:14px;padding:10px 8px;text-align:center;backdrop-filter:blur(4px)}
.cal-sum-val{font-size:22px;font-weight:900;color:#fff}
.cal-sum-label{font-size:10px;color:rgba(255,255,255,.65);font-weight:600;margin-top:2px}
.cal-content{padding:20px 16px 100px;max-width:480px;margin:0 auto}
.cal-grid{background:#fff;border-radius:22px;padding:18px 14px;box-shadow:0 2px 20px rgba(14,165,233,.07),0 1px 4px rgba(0,0,0,.04);margin-bottom:14px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:8px}
.cal-weekday{font-size:11px;font-weight:700;color:#94a3b8;padding:6px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:14px;font-size:14px;font-weight:700;color:#0c4a6e;position:relative;transition:all .2s;cursor:pointer}
.cal-day.empty{visibility:hidden}
.cal-day.today{box-shadow:0 0 0 2px #0ea5e9}
.cal-day.hit{background:rgba(34,197,94,.12);color:#16a34a}
.cal-day.miss{background:rgba(239,68,68,.08);color:#ef4444}
.cal-day.future{color:#cbd5e1}
.cal-day .cal-icon{font-size:10px;margin-top:1px;line-height:1}
.cal-day.partial{background:rgba(251,191,36,.1);color:#d97706}
.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:14px}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#64748b}
.cal-legend-dot{width:12px;height:12px;border-radius:6px}
.cal-day-detail{background:#fff;border-radius:22px;padding:18px;box-shadow:0 2px 20px rgba(14,165,233,.07);margin-bottom:14px;display:none}
.cal-day-detail.show{display:block}
.cal-detail-title{font-weight:800;font-size:16px;color:#0c4a6e;margin-bottom:12px}
.cal-detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f9ff}
.cal-detail-row:last-child{border:none}
.cal-detail-label{font-weight:600;font-size:14px;color:#64748b}
.cal-detail-val{font-weight:800;font-size:16px}
.cal-detail-val.hit{color:#16a34a}
.cal-detail-val.miss{color:#ef4444}

input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.header{background:linear-gradient(135deg,#0284c7,#0ea5e9,#38bdf8);padding:20px 20px 28px;border-radius:0 0 28px 28px;box-shadow:0 8px 32px rgba(14,165,233,.25)}
.header-top{display:flex;justify-content:space-between;align-items:center;padding-top:max(4px,env(safe-area-inset-top))}
.app-title{font-weight:900;font-size:26px;color:#fff;letter-spacing:-.5px}
.app-date{font-size:13px;color:rgba(255,255,255,.7);font-weight:500;margin-top:2px}
.goals-btn{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);border-radius:14px;padding:8px 16px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.mini-bars{display:flex;gap:8px;margin-top:16px}
.mini-bar{flex:1;background:rgba(255,255,255,.15);border-radius:14px;padding:10px 8px;text-align:center;backdrop-filter:blur(4px)}
.mini-bar-num{font-size:13px;font-weight:800;color:#fff}
.mini-bar-track{height:4px;background:rgba(255,255,255,.2);border-radius:4px;margin-top:6px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:4px;background:#fff;transition:width .5s cubic-bezier(.4,0,.2,1)}
.mini-bar-fill.done{background:#22c55e}
.mini-bar-label{font-size:10px;color:rgba(255,255,255,.65);font-weight:600;margin-top:4px}
.all-done{margin-top:12px;background:rgba(34,197,94,.22);border-radius:14px;padding:10px 16px;text-align:center;font-weight:800;font-size:14px;color:#fff;border:1px solid rgba(34,197,94,.4);display:none}
.all-done.show{display:block}
.tracking-label{margin-top:8px;text-align:center;font-size:11px;color:rgba(255,255,255,.55);font-weight:600;letter-spacing:.3px}

.content{padding:20px 16px 100px;max-width:480px;margin:0 auto}

.card{background:#fff;border-radius:22px;padding:22px 18px;box-shadow:0 2px 20px rgba(14,165,233,.07),0 1px 4px rgba(0,0,0,.04);margin-bottom:14px;transition:border-color .4s;border:2px solid transparent}
.card.complete{border-color:#22c55e}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;justify-content:center}
.card-title{font-weight:800;font-size:17px;color:#0c4a6e;letter-spacing:-.3px}

.ring-wrap{position:relative;width:130px;height:130px;margin:0 auto 12px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(56,189,248,.1);stroke-width:10}
.ring-fg{fill:none;stroke:#38bdf8;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1),stroke .3s}
.ring-fg.done{stroke:#22c55e}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-weight:900;font-size:28px;color:#0369a1;line-height:1}
.ring-num.done{color:#16a34a}
.ring-goal{font-size:12px;color:#94a3b8;font-weight:600;margin-top:2px}
.goal-badge{font-size:12px;font-weight:700;color:#16a34a;background:rgba(34,197,94,.1);padding:4px 14px;border-radius:20px;text-align:center;margin-bottom:8px}

.quick-adds{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.quick-btn{background:linear-gradient(135deg,#e0f2fe,#f0f9ff);border:1.5px solid #bae6fd;border-radius:14px;padding:9px 15px;font-weight:700;font-size:14px;color:#0369a1;cursor:pointer;font-family:inherit;transition:transform .1s}
.quick-btn:active{transform:scale(.93)}

.input-row{display:flex;gap:6px}
.input-row input{flex:1;border:1.5px solid #e0f2fe;border-radius:14px;padding:10px 14px;font-size:15px;font-family:inherit;outline:none;background:#f8fdff;color:#0c4a6e;font-weight:600}
.input-row input:focus{border-color:#7dd3fc}
.add-btn{background:linear-gradient(135deg,#0ea5e9,#38bdf8);border:none;border-radius:14px;padding:10px 20px;color:#fff;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(14,165,233,.3);transition:transform .1s}
.add-btn:active{transform:scale(.93)}

.run-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.run-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#38bdf8);display:flex;align-items:center;justify-content:center;font-size:22px}
.run-title{font-weight:800;font-size:17px;color:#0c4a6e}
.run-sub{font-size:12px;color:#94a3b8;font-weight:500}
.run-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.run-stat{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-radius:16px;padding:12px 8px;text-align:center}
.run-stat-label{font-size:11px;color:#64748b;font-weight:600;margin-bottom:4px}
.run-stat-val{font-size:20px;font-weight:900;color:#0369a1}
.run-stat-unit{font-size:11px;color:#94a3b8;font-weight:600}

.stats-title{font-weight:800;font-size:17px;color:#0c4a6e;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stats-table{width:100%;border-collapse:collapse;margin-bottom:14px}
.stats-table th{text-align:center;padding:8px 6px;font-size:12px;color:#94a3b8;font-weight:700;border-bottom:2px solid #f0f9ff}
.stats-table th:first-child{text-align:left}
.stats-table td{padding:10px 6px;font-weight:700;font-size:14px;color:#0c4a6e}
.stats-table td:not(:first-child){text-align:center;font-weight:800;font-size:16px;color:#0369a1}
.totals-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.total-box{background:linear-gradient(135deg,#e0f2fe,#f0f9ff);border-radius:16px;padding:14px 12px;text-align:center}
.total-label{font-size:11px;color:#64748b;font-weight:600}
.total-val{font-size:26px;font-weight:900;color:#0369a1}
.reset-btn{display:block;margin:32px auto 0;background:transparent;border:1.5px solid #e2e8f0;border-radius:14px;padding:10px 24px;color:#94a3b8;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}

/* Squad card styles */
.squad-card{background:linear-gradient(135deg,#faf5ff,#ede9fe);border-radius:22px;padding:20px 18px;box-shadow:0 2px 20px rgba(139,92,246,.08);margin-bottom:14px;border:2px solid rgba(139,92,246,.2)}
.squad-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.squad-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#8b5cf6,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:22px}
.squad-title{font-weight:800;font-size:17px;color:#4c1d95}
.squad-sub{font-size:12px;color:#a78bfa;font-weight:500}
.squad-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.squad-col{background:rgba(255,255,255,.7);border-radius:16px;padding:12px}
.squad-col-name{font-weight:800;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.squad-col-name.me{color:#6d28d9}
.squad-col-name.buddy{color:#7c3aed}
.squad-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;font-weight:600;color:#4c1d95}
.squad-row span:last-child{font-weight:800}
.squad-status{font-size:11px;color:#8b5cf6;text-align:center;margin-bottom:10px;font-weight:600}
.squad-setup-btn{width:100%;background:linear-gradient(135deg,#8b5cf6,#7c3aed);border:none;border-radius:16px;padding:13px;color:#fff;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(139,92,246,.3);transition:transform .1s}
.squad-setup-btn:active{transform:scale(.97)}
.squad-modal-label{font-weight:700;font-size:14px;color:#4c1d95;display:block;margin-bottom:6px}
.squad-modal-input{width:100%;border:2px solid #ddd6fe;border-radius:14px;padding:12px 16px;font-size:16px;font-family:inherit;outline:none;font-weight:700;color:#4c1d95;background:#faf5ff;margin-bottom:14px}
.squad-modal-input:focus{border-color:#8b5cf6}
.squad-last-seen{font-size:11px;color:#a78bfa;font-weight:500;text-align:center;margin-top:6px}
.squad-react-bar{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.squad-react-btn{background:rgba(255,255,255,.7);border:1.5px solid rgba(139,92,246,.15);border-radius:12px;padding:6px 10px;font-size:20px;cursor:pointer;transition:transform .15s;line-height:1}
.squad-react-btn:active{transform:scale(1.3)}
.squad-msg-row{display:flex;gap:6px;margin-top:8px}
.squad-msg-input{flex:1;border:1.5px solid #ddd6fe;border-radius:12px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;font-weight:600;color:#4c1d95;background:rgba(255,255,255,.7)}
.squad-msg-input:focus{border-color:#8b5cf6}
.squad-msg-send{background:linear-gradient(135deg,#8b5cf6,#7c3aed);border:none;border-radius:12px;padding:8px 14px;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit}
.squad-msg-send:active{transform:scale(.93)}
.squad-incoming{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(255,255,255,.95);border-radius:28px;padding:32px 40px;text-align:center;z-index:2000;box-shadow:0 24px 64px rgba(0,0,0,.2);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);pointer-events:none;opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1)}
.squad-incoming.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.squad-incoming-emoji{font-size:64px;line-height:1;margin-bottom:8px}
.squad-incoming-from{font-size:14px;font-weight:800;color:#4c1d95;margin-bottom:4px}
.squad-incoming-msg{font-size:15px;font-weight:600;color:#6d28d9;max-width:240px;word-wrap:break-word}
.squad-feed{margin-top:10px;max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.squad-feed-title{font-weight:800;font-size:12px;color:#6d28d9;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.squad-feed-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:10px;margin-bottom:3px;font-size:12px;font-weight:600}
.squad-feed-item.me{background:rgba(139,92,246,.08);color:#4c1d95}
.squad-feed-item.buddy{background:rgba(251,191,36,.08);color:#92400e}
.squad-feed-time{font-size:11px;color:#a78bfa;font-weight:500;white-space:nowrap;margin-left:8px}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(40px);opacity:0;background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff;padding:12px 28px;border-radius:50px;font-weight:700;font-size:15px;box-shadow:0 8px 32px rgba(14,165,233,.35);z-index:999;pointer-events:none;white-space:nowrap;transition:all .4s cubic-bezier(.4,0,.2,1)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.modal-bg{position:fixed;inset:0;background:rgba(12,74,110,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:28px;padding:32px 24px;max-width:380px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.15);animation:modalIn .3s ease}
@keyframes modalIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-weight:900;font-size:22px;color:#0c4a6e;text-align:center;margin-bottom:4px}
.modal-sub{font-size:13px;color:#94a3b8;text-align:center;margin-bottom:24px;font-weight:500}
.modal-label{font-weight:700;font-size:14px;color:#0c4a6e;display:block;margin-bottom:6px}
.modal-input{width:100%;border:2px solid #e0f2fe;border-radius:14px;padding:12px 16px;font-size:18px;font-family:inherit;outline:none;font-weight:800;color:#0369a1;background:#f8fdff;margin-bottom:16px}
.modal-input:focus{border-color:#7dd3fc}
.modal-save{width:100%;background:linear-gradient(135deg,#0ea5e9,#38bdf8);border:none;border-radius:16px;padding:14px;color:#fff;font-weight:900;font-size:17px;cursor:pointer;font-family:inherit;margin-top:8px;box-shadow:0 6px 24px rgba(14,165,233,.35)}

.reminder{border-radius:18px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;animation:slideIn .4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.reminder-icon{font-size:24px;flex-shrink:0}
.reminder-text{font-size:13px;font-weight:600;line-height:1.4}
.reminder-title{font-weight:800;font-size:14px;margin-bottom:2px}
.reminder.morning{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #fbbf24;color:#92400e}
.reminder.nudge{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border:1.5px solid #60a5fa;color:#1e40af}
.reminder.evening{background:linear-gradient(135deg,#fce7f3,#fbcfe8);border:1.5px solid #f472b6;color:#9d174d}
.reminder.streak{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border:1.5px solid #34d399;color:#065f46}

.suggest-banner{background:linear-gradient(135deg,#fff7ed,#fef3c7);border-radius:20px;padding:18px 16px;border:2px solid #fbbf24;margin-bottom:14px}
.suggest-title{font-weight:800;font-size:15px;color:#92400e;margin-bottom:12px}
.suggest-item{background:rgba(255,255,255,.7);border-radius:14px;padding:12px 14px;margin-bottom:8px}
.suggest-msg{font-size:13px;color:#78350f;font-weight:600;margin-bottom:8px}
.suggest-btns{display:flex;gap:8px}
.suggest-accept{background:#16a34a;border:none;border-radius:10px;padding:6px 16px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.suggest-dismiss{background:#e5e7eb;border:none;border-radius:10px;padding:6px 16px;color:#64748b;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="pages-wrap" id="pagesWrap">
<div class="page" id="pageDash">

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">FitTrack</div>
      <div class="app-date" id="dateDisplay"></div>
    </div>
    <button class="goals-btn" onclick="openGoalModal()">⚙️ Goals</button>
  </div>
  <div class="mini-bars" id="miniBars"></div>
  <div class="all-done" id="allDone">🏆 All daily goals complete! Champion.</div>
  <div class="tracking-label" id="trackingLabel"></div>
</div>

<div class="content" id="content"></div>

</div>
<div class="page" id="pageCal">

<div class="cal-header">
  <div class="cal-header-top">
    <button class="cal-back" onclick="goPage(0)">← Back</button>
    <div class="cal-title">📅 Calendar</div>
    <div style="width:70px"></div>
  </div>
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="calPrev()">‹</button>
    <div class="cal-month" id="calMonth"></div>
    <button class="cal-nav-btn" onclick="calNext()">›</button>
  </div>
  <div class="cal-summary" id="calSummary"></div>
</div>

<div class="cal-content">
  <div class="cal-grid">
    <div class="cal-weekdays">
      <div class="cal-weekday">Mon</div><div class="cal-weekday">Tue</div><div class="cal-weekday">Wed</div>
      <div class="cal-weekday">Thu</div><div class="cal-weekday">Fri</div><div class="cal-weekday">Sat</div><div class="cal-weekday">Sun</div>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>
  <div class="cal-legend">
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(34,197,94,.5)"></div>All goals hit</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(251,191,36,.5)"></div>Partial</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(239,68,68,.4)"></div>Missed</div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   FitTrack v3 — Rebuilt with bulletproof LOCAL date logic
   
   WHY THE OLD VERSION BROKE:
   The old dayKey() used Date.toISOString() which returns UTC time.
   In Sydney (UTC+11), logging reps at 10pm Saturday would create a key
   for Sunday UTC. This caused cross-day contamination — Saturday's data
   appeared under Sunday, and the daily reset looked broken.
   
   HOW THE NEW VERSION WORKS:
   - getLocalDateKey() builds YYYY-MM-DD from local year/month/day
   - All date keys are local timezone, never UTC
   - rolloverIfNeeded() runs on every app resume and every 30 seconds
   - It compares the stored "activeDate" against today's local date
   - If they differ, it finalizes the old day and creates a fresh today
   - Historical data is keyed by local date and never mutated after the day ends
   
   ═══════════════════════════════════════════════════════════════════════════ */

const SK = 'fittrack-v3'; // New storage key to avoid conflicts with old data
const EX = [
  { id: 'pushups', label: 'Push-ups', icon: '💪', qa: [10, 15, 20, 25] },
  { id: 'pullups', label: 'Pull-ups', icon: '🏋️', qa: [5, 8, 10, 12] },
  { id: 'squats',  label: 'Squats',  icon: '🦵', qa: [10, 15, 20, 25] }
];

const ILL = {
  pushups: '<svg viewBox="0 0 80 50" width="56" height="36" fill="none"><rect x="5" y="38" width="70" height="4" rx="2" fill="rgba(56,189,248,.15)"/><line x1="20" y1="28" x2="60" y2="24" stroke="#0ea5e9" stroke-width="3.5" stroke-linecap="round"/><circle cx="17" cy="22" r="6" fill="#38bdf8"/><line x1="18" y1="35" x2="14" y2="38" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="58" y1="30" x2="62" y2="38" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="20" y1="28" x2="16" y2="36" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="22" y1="28" x2="26" y2="36" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/></svg>',
  pullups: '<svg viewBox="0 0 80 56" width="56" height="40" fill="none"><rect x="10" y="4" width="60" height="4" rx="2" fill="rgba(56,189,248,.25)"/><line x1="30" y1="8" x2="30" y2="16" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="50" y1="8" x2="50" y2="16" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><circle cx="40" cy="20" r="6" fill="#38bdf8"/><line x1="40" y1="26" x2="40" y2="42" stroke="#0ea5e9" stroke-width="3.5" stroke-linecap="round"/><line x1="40" y1="42" x2="34" y2="52" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="40" y1="42" x2="46" y2="52" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="40" y1="30" x2="30" y2="16" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="40" y1="30" x2="50" y2="16" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/></svg>',
  squats: '<svg viewBox="0 0 80 58" width="56" height="40" fill="none"><circle cx="40" cy="10" r="6" fill="#38bdf8"/><line x1="40" y1="16" x2="40" y2="32" stroke="#0ea5e9" stroke-width="3.5" stroke-linecap="round"/><line x1="40" y1="32" x2="30" y2="44" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="40" y1="32" x2="50" y2="44" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="30" y1="44" x2="28" y2="54" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="50" y1="44" x2="52" y2="54" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="40" y1="22" x2="30" y2="28" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/><line x1="40" y1="22" x2="50" y2="28" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/></svg>'
};

/* ═══════════════════════════════════════════════════════════════════════════
   CORE DATE FUNCTIONS — All use LOCAL time, never UTC
   ═══════════════════════════════════════════════════════════════════════════ */

/**
 * getLocalDateKey(date?) → "YYYY-MM-DD" in LOCAL timezone
 * This is the single source of truth for date keys.
 * NEVER use toISOString() for date keys — it returns UTC.
 */
function getLocalDateKey(d) {
  d = d || new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

/**
 * getLocalWeekKey(date?) → "YYYY-MM-DD" of Monday of that week (local time)
 */
function getLocalWeekKey(d) {
  d = new Date(d || new Date());
  d.setHours(0, 0, 0, 0);
  const dow = d.getDay(); // 0=Sun, 1=Mon...
  const diff = d.getDate() - dow + (dow === 0 ? -6 : 1); // Adjust to Monday
  d.setDate(diff);
  return getLocalDateKey(d);
}

/**
 * getLocalYearKey(date?) → "YYYY"
 */
function getLocalYearKey(d) {
  return (d || new Date()).getFullYear().toString();
}

/**
 * parseLocalDate(dateKey) → Date object at midnight local time
 * Use this instead of new Date(dateKey) which can shift timezone
 */
function parseLocalDate(dk) {
  const parts = dk.split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
}

/* ═══════════════════════════════════════════════════════════════════════════
   DATA MODEL & PERSISTENCE
   
   Structure:
   {
     goals: { pushups: 100, pullups: 30, squats: 80 },
     goalWeekStart: "2026-03-02",    // Monday of goal week
     activeDate: "2026-03-08",       // Last known active date
     dailyLogs: {
       "2026-03-07": { pushups: 100, pullups: 30, squats: 80 },
       "2026-03-08": { pushups: 0, pullups: 0, squats: 0 }
     },
     runningLogs: {
       "2026-03-07": 5.2,
       "2026-03-08": 0
     },
     dismissed: {}
   }
   ═══════════════════════════════════════════════════════════════════════════ */

function defaultData() {
  return {
    goals: { pushups: 100, pullups: 30, squats: 80 },
    goalWeekStart: getLocalWeekKey(),
    activeDate: getLocalDateKey(),
    dailyLogs: {},
    runningLogs: {},
    dismissed: {},
    activityLog: []
  };
}

let D;

function loadData() {
  try {
    // Try new storage key first
    let s = localStorage.getItem(SK);
    if (s) {
      D = { ...defaultData(), ...JSON.parse(s) };
    } else {
      // Try to migrate from old storage key
      const oldData = localStorage.getItem('fittrack-data');
      if (oldData) {
        const parsed = JSON.parse(oldData);
        D = { ...defaultData(), ...parsed };
        // Save under new key
        saveData();
        console.log('[FitTrack] Migrated data from old storage key');
      } else {
        D = defaultData();
      }
    }
  } catch (e) {
    console.error('[FitTrack] Load error:', e);
    D = defaultData();
  }
}

function saveData() {
  try {
    localStorage.setItem(SK, JSON.stringify(D));
  } catch (e) {
    console.error('[FitTrack] Save error:', e);
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   DAILY ROLLOVER SYSTEM
   
   This is the core fix. It runs:
   1. On initial app load
   2. Every time the app becomes visible (switching back from another app)
   3. Every 30 seconds as a safety net (catches midnight crossover)
   
   Logic:
   - Compare D.activeDate (last date the app was used) with today
   - If they differ, today is a new day
   - The old day's data stays frozen under its date key
   - A fresh record is created for today with 0 reps
   - D.activeDate is updated to today
   ═══════════════════════════════════════════════════════════════════════════ */

/**
 * ensureTodayExists() — Makes sure today has a log entry
 * Called before any read or write to daily data
 */
function ensureTodayExists() {
  const today = getLocalDateKey();
  if (!D.dailyLogs[today]) {
    D.dailyLogs[today] = {};
    EX.forEach(function(e) { D.dailyLogs[today][e.id] = 0; });
  }
  // Ensure each exercise key exists (in case exercises were added later)
  EX.forEach(function(e) {
    if (typeof D.dailyLogs[today][e.id] !== 'number') {
      D.dailyLogs[today][e.id] = 0;
    }
  });
}

/**
 * rolloverIfNeeded() — The main daily reset function
 * Returns true if a rollover happened (new day detected)
 */
function rolloverIfNeeded() {
  const today = getLocalDateKey();
  const lastActive = D.activeDate || today;

  if (lastActive === today) {
    // Same day — just make sure today's record exists
    ensureTodayExists();
    return false;
  }

  // ═══ NEW DAY DETECTED ═══
  console.log('[FitTrack] Day rollover: ' + lastActive + ' → ' + today);

  // Step 1: The old day's data is already frozen in dailyLogs[lastActive]
  // Nothing to do — it stays exactly as it was logged

  // Step 2: Create fresh record for today
  D.activeDate = today;
  ensureTodayExists();

  // Step 3: Save immediately so the rollover persists
  saveData();

  return true;
}

/* ═══════════════════════════════════════════════════════════════════════════
   TODAY'S DATA ACCESSORS
   These always read from today's local date key, never from a stale reference
   ═══════════════════════════════════════════════════════════════════════════ */

function getTodayLog() {
  const today = getLocalDateKey();
  ensureTodayExists();
  return D.dailyLogs[today];
}

function getTodayKey() {
  return getLocalDateKey();
}

/* ═══════════════════════════════════════════════════════════════════════════
   EXERCISE LOGGING — Always writes to today's record only
   ═══════════════════════════════════════════════════════════════════════════ */

function logEx(id, n) {
  n = parseInt(n);
  if (!(n > 0)) return;

  // Always check for rollover before logging
  rolloverIfNeeded();

  const today = getTodayKey();
  const prev = D.dailyLogs[today][id] || 0;
  D.dailyLogs[today][id] = prev + n;
  saveData();

  // Track activity with timestamp for squad feed
  if (!D.activityLog) D.activityLog = [];
  D.activityLog.push({ id: id, n: n, t: Date.now() });
  // Keep only last 50 entries to avoid bloating storage
  if (D.activityLog.length > 50) D.activityLog = D.activityLog.slice(-50);

  const total = D.dailyLogs[today][id];
  const goal = D.goals[id];
  const ex = EX.find(function(e) { return e.id === id; });

  if (total >= goal && prev < goal) {
    showToast(ex.label + ' goal smashed! 🎉');
  } else {
    var phrases = ['Nice set!', 'Keep pushing!', 'Solid work!', 'Strong! 💪', 'Let\'s go!'];
    showToast(phrases[Math.floor(Math.random() * phrases.length)]);
  }
  squadPushMyData();
  render();
}

function addInp(id) {
  var i = document.getElementById('inp-' + id);
  logEx(id, i.value);
  i.value = '';
}

function logRun(km) {
  km = parseFloat(km);
  if (!(km > 0)) return;
  rolloverIfNeeded();
  var today = getTodayKey();
  D.runningLogs[today] = (D.runningLogs[today] || 0) + km;
  // Track activity with timestamp for squad feed
  if (!D.activityLog) D.activityLog = [];
  D.activityLog.push({ id: 'run', n: km, t: Date.now() });
  if (D.activityLog.length > 50) D.activityLog = D.activityLog.slice(-50);
  saveData();
  showToast('+' + km + 'km logged! 🏃');
  squadPushMyData();
  render();
}

function addRunInp() {
  var i = document.getElementById('inp-run');
  logRun(i.value);
  i.value = '';
}

/* ═══════════════════════════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
   ═══════════════════════════════════════════════════════════════════════════ */

var toastTimer;
function showToast(m) {
  var e = document.getElementById('toast');
  e.textContent = '🔥 ' + m;
  e.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { e.classList.remove('show'); }, 1800);
}

/* ═══════════════════════════════════════════════════════════════════════════
   PROGRESS RING
   ═══════════════════════════════════════════════════════════════════════════ */

function ringH(id, cur, goal) {
  var sz = 130, sw = 10, r = (sz - sw) / 2, c = 2 * Math.PI * r;
  var p = goal > 0 ? Math.min(1, cur / goal) : 0;
  var o = c - p * c;
  var dn = cur >= goal && goal > 0;
  return '<div class="ring-wrap"><svg width="' + sz + '" height="' + sz + '"><circle cx="65" cy="65" r="' + r + '" class="ring-bg" stroke-width="' + sw + '"/><circle cx="65" cy="65" r="' + r + '" class="ring-fg' + (dn ? ' done' : '') + '" stroke-width="' + sw + '" stroke-dasharray="' + c + '" stroke-dashoffset="' + o + '"/></svg><div class="ring-text"><span class="ring-num' + (dn ? ' done' : '') + '">' + cur + '</span><span class="ring-goal">/ ' + goal + '</span></div></div>';
}

/* ═══════════════════════════════════════════════════════════════════════════
   GOALS MODAL
   ═══════════════════════════════════════════════════════════════════════════ */

function openGoalModal() {
  document.getElementById('goalPushups').value = D.goals.pushups;
  document.getElementById('goalPullups').value = D.goals.pullups;
  document.getElementById('goalSquats').value = D.goals.squats;
  document.getElementById('goalModal').classList.add('show');
}

function saveGoals() {
  D.goals.pushups = parseInt(document.getElementById('goalPushups').value) || 100;
  D.goals.pullups = parseInt(document.getElementById('goalPullups').value) || 30;
  D.goals.squats = parseInt(document.getElementById('goalSquats').value) || 80;
  D.goalWeekStart = getLocalWeekKey();
  D.dismissed = {};
  saveData();
  document.getElementById('goalModal').classList.remove('show');
  render();
}

/* ═══════════════════════════════════════════════════════════════════════════
   WEEKLY SUGGESTIONS
   ═══════════════════════════════════════════════════════════════════════════ */

function getSugg() {
  var wk = getLocalWeekKey();
  var gs = D.goalWeekStart;
  if (!gs) return [];
  var gsDate = parseLocalDate(gs);
  var daysSince = Math.floor((new Date() - gsDate) / (1000 * 60 * 60 * 24));
  if (daysSince < 7) return [];

  var out = [];
  EX.forEach(function(ex) {
    if (D.dismissed[ex.id + '-' + wk]) return;
    var hit = 0;
    for (var i = 0; i < 7; i++) {
      var d = new Date(gsDate);
      d.setDate(d.getDate() + i);
      var dk = getLocalDateKey(d);
      var l = D.dailyLogs[dk] || {};
      if ((l[ex.id] || 0) >= D.goals[ex.id]) hit++;
    }
    var cur = D.goals[ex.id];
    if (hit / 7 >= 0.7) {
      var inc = Math.max(1, Math.round(cur * 0.1));
      out.push({ id: ex.id, label: ex.label, icon: ex.icon,
        msg: 'You hit your ' + ex.label.toLowerCase() + ' goal ' + hit + '/7 days. Increase from ' + cur + ' to ' + (cur + inc) + '?',
        ng: cur + inc, up: true });
    } else {
      out.push({ id: ex.id, label: ex.label, icon: ex.icon,
        msg: 'Your ' + ex.label.toLowerCase() + ' goal was challenging (' + hit + '/7 days). Keep at ' + cur + '?',
        ng: cur, up: false });
    }
  });
  return out;
}

function acceptS(id, ng) {
  var wk = getLocalWeekKey();
  D.goals[id] = ng;
  D.goalWeekStart = wk;
  D.dismissed[id + '-' + wk] = true;
  saveData();
  render();
}

function dismissS(id) {
  var wk = getLocalWeekKey();
  D.goalWeekStart = wk;
  D.dismissed[id + '-' + wk] = true;
  saveData();
  render();
}

/* ═══════════════════════════════════════════════════════════════════════════
   STATISTICS — Computed from dailyLogs using LOCAL date keys
   ═══════════════════════════════════════════════════════════════════════════ */

function computeStats() {
  var today = getTodayKey();
  var wk = getLocalWeekKey();
  var yr = getLocalYearKey();
  var tl = getTodayLog();

  var wT = {}, yT = {};
  EX.forEach(function(e) { wT[e.id] = 0; yT[e.id] = 0; });

  Object.keys(D.dailyLogs).forEach(function(dk) {
    var log = D.dailyLogs[dk];
    var d = parseLocalDate(dk);
    var dWeek = getLocalWeekKey(d);
    var dYear = getLocalYearKey(d);
    EX.forEach(function(e) {
      if (dWeek === wk) wT[e.id] += (log[e.id] || 0);
      if (dYear === yr) yT[e.id] += (log[e.id] || 0);
    });
  });

  var rT = D.runningLogs[today] || 0, rW = 0, rY = 0;
  Object.keys(D.runningLogs).forEach(function(dk) {
    var d = parseLocalDate(dk);
    if (getLocalWeekKey(d) === wk) rW += D.runningLogs[dk];
    if (getLocalYearKey(d) === yr) rY += D.runningLogs[dk];
  });

  return {
    tl: tl, wT: wT, yT: yT, rT: rT, rW: rW, rY: rY,
    twk: EX.reduce(function(s, e) { return s + wT[e.id]; }, 0),
    tyr: EX.reduce(function(s, e) { return s + yT[e.id]; }, 0)
  };
}

/* ═══════════════════════════════════════════════════════════════════════════
   REMINDERS
   ═══════════════════════════════════════════════════════════════════════════ */

function getReminders() {
  var hr = new Date().getHours();
  var tl = getTodayLog();
  var totalDone = EX.reduce(function(s, e) { return s + (tl[e.id] || 0); }, 0);
  var totalGoal = EX.reduce(function(s, e) { return s + D.goals[e.id]; }, 0);
  var pct = totalGoal > 0 ? totalDone / totalGoal : 0;
  var allDone = EX.every(function(e) { return (tl[e.id] || 0) >= D.goals[e.id]; });
  var reminders = [];

  // Streak
  var streak = 0;
  for (var i = 1; i <= 30; i++) {
    var d = new Date(); d.setDate(d.getDate() - i);
    var log = D.dailyLogs[getLocalDateKey(d)] || {};
    if (EX.every(function(e) { return (log[e.id] || 0) >= D.goals[e.id]; })) streak++;
    else break;
  }

  if (allDone) {
    if (streak >= 2) reminders.push({ type: 'streak', icon: '🔥', title: streak + ' day streak!', msg: 'You\'re on fire! All goals smashed ' + streak + ' days in a row.' });
    return reminders;
  }

  if (hr >= 5 && hr < 12 && totalDone === 0) {
    var msgs = ['Rise and grind! Your goals are waiting.', 'Good morning! Fresh day, fresh goals. Let\'s go!', 'New day, new gains. Time to log your first set!'];
    reminders.push({ type: 'morning', icon: '☀️', title: 'Good morning!', msg: msgs[Math.floor(Math.random() * msgs.length)] });
  }

  if (hr >= 12 && hr < 17 && totalDone > 0 && pct < 1) {
    var closest = EX.reduce(function(best, e) {
      var p = (tl[e.id] || 0) / D.goals[e.id];
      return p > best.p && p < 1 ? { id: e.id, label: e.label, p: p, left: D.goals[e.id] - (tl[e.id] || 0) } : best;
    }, { p: 0, label: '', left: 0 });
    if (closest.label) reminders.push({ type: 'nudge', icon: '💪', title: 'Keep pushing!', msg: 'You\'re ' + Math.round(pct * 100) + '% through today. Only ' + closest.left + ' ' + closest.label.toLowerCase() + ' left!' });
  }

  if (hr >= 12 && hr < 17 && totalDone === 0) {
    reminders.push({ type: 'nudge', icon: '🎯', title: 'Afternoon check-in', msg: 'No reps logged yet today. Even one set counts — get started!' });
  }

  if (hr >= 17 && hr < 23 && pct < 1) {
    if (totalDone === 0) {
      reminders.push({ type: 'evening', icon: '⏰', title: 'Don\'t miss today!', msg: 'No reps logged yet. Squeeze in a few sets before bed!' });
    } else {
      var left = totalGoal - totalDone;
      reminders.push({ type: 'evening', icon: '🏁', title: 'Almost there!', msg: 'You\'ve done ' + totalDone + ' reps. Just ' + left + ' more to finish. Go!' });
    }
  }

  if (streak >= 2 && !allDone) {
    reminders.push({ type: 'streak', icon: '🔥', title: 'Protect your ' + streak + ' day streak!', msg: 'Don\'t break the chain — hit your goals today.' });
  }

  return reminders;
}

var curPage = 0, touchX = 0, touchY = 0, swiping = false;

function goPage(p) {
  curPage = p;
  document.getElementById('pagesWrap').classList.toggle('on-cal', p === 1);
  document.getElementById('dot0').classList.toggle('active', p === 0);
  document.getElementById('dot1').classList.toggle('active', p === 1);
  window.scrollTo(0, 0);
  if (p === 1) renderCal();
}

document.addEventListener('touchstart', function(e) {
  if (document.getElementById('goalModal').classList.contains('show')) return;
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
  swiping = true;
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (!swiping) return;
  swiping = false;
  var dx = e.changedTouches[0].clientX - touchX;
  var dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
    if (dx < 0 && curPage === 0) goPage(1);
    else if (dx > 0 && curPage === 1) goPage(0);
  }
}, { passive: true });

/* ═══════════════════════════════════════════════════════════════════════════
   CALENDAR VIEW
   
   Calendar uses LOCAL date keys for everything.
   Each day's status is determined by comparing that day's log against goals.
   Today is always treated as "in progress" (never "missed") until the day ends.
   Past days with no log are marked "missed". Past days with partial log = "partial".
   Future days are greyed out.
   ═══════════════════════════════════════════════════════════════════════════ */

var calYear = new Date().getFullYear();
var calMon = new Date().getMonth();
var selectedDay = null;

function calPrev() {
  calMon--;
  if (calMon < 0) { calMon = 11; calYear--; }
  renderCal();
}

function calNext() {
  var now = new Date();
  if (calYear > now.getFullYear() || (calYear === now.getFullYear() && calMon >= now.getMonth())) return;
  calMon++;
  if (calMon > 11) { calMon = 0; calYear++; }
  renderCal();
}

function renderCal() {
  var now = new Date();
  var todayStr = getLocalDateKey();
  var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  document.getElementById('calMonth').textContent = months[calMon] + ' ' + calYear;

  var firstDay = new Date(calYear, calMon, 1);
  var startDay = firstDay.getDay() - 1;
  if (startDay < 0) startDay = 6;
  var daysInMonth = new Date(calYear, calMon + 1, 0).getDate();

  // Determine the earliest date we started tracking (to avoid marking pre-app days as missed)
  var earliestDate = null;
  Object.keys(D.dailyLogs).forEach(function(dk) {
    if (!earliestDate || dk < earliestDate) earliestDate = dk;
  });

  var hitDays = 0, missDays = 0, partialDays = 0;
  var dayStatuses = [];

  for (var d = 1; d <= daysInMonth; d++) {
    var date = new Date(calYear, calMon, d);
    var dk = getLocalDateKey(date);
    var log = D.dailyLogs[dk] || {};
    var isFuture = dk > todayStr;
    var isToday = dk === todayStr;
    var isBeforeTracking = earliestDate && dk < earliestDate;
    var hasAny = EX.some(function(e) { return (log[e.id] || 0) > 0; });
    var allHit = EX.every(function(e) { return (log[e.id] || 0) >= D.goals[e.id]; });

    var status = 'none';
    if (isFuture) {
      status = 'future';
    } else if (allHit) {
      status = 'hit';
      hitDays++;
    } else if (isToday) {
      // Today is never "missed" — it's either in-progress or not started yet
      status = hasAny ? 'partial' : 'today-empty';
      if (hasAny) partialDays++;
    } else if (hasAny) {
      status = 'partial';
      partialDays++;
    } else if (isBeforeTracking) {
      // Don't mark days before the user started as missed
      status = 'none';
    } else {
      status = 'miss';
      missDays++;
    }

    dayStatuses.push({ d: d, dk: dk, status: status, isToday: isToday, log: log });
  }

  // Summary
  document.getElementById('calSummary').innerHTML =
    '<div class="cal-sum-box"><div class="cal-sum-val">' + hitDays + '</div><div class="cal-sum-label">Days Hit ✅</div></div>' +
    '<div class="cal-sum-box"><div class="cal-sum-val">' + partialDays + '</div><div class="cal-sum-label">Partial ⚡</div></div>' +
    '<div class="cal-sum-box"><div class="cal-sum-val">' + missDays + '</div><div class="cal-sum-label">Missed ❌</div></div>';

  // Grid
  var grid = '';
  for (var i = 0; i < startDay; i++) grid += '<div class="cal-day empty"></div>';

  dayStatuses.forEach(function(ds) {
    var cls = 'cal-day';
    var icon = '';
    if (ds.isToday) cls += ' today';
    if (ds.status === 'hit') { cls += ' hit'; icon = '<div class="cal-icon">✅</div>'; }
    else if (ds.status === 'miss') { cls += ' miss'; icon = '<div class="cal-icon">❌</div>'; }
    else if (ds.status === 'partial') { cls += ' partial'; icon = '<div class="cal-icon">⚡</div>'; }
    else if (ds.status === 'future') { cls += ' future'; }

    grid += '<div class="' + cls + '" onclick="showDayDetail(\'' + ds.dk + '\')">' + ds.d + icon + '</div>';
  });

  document.getElementById('calDays').innerHTML = grid;
  if (selectedDay) showDayDetail(selectedDay);
}

function showDayDetail(dk) {
  selectedDay = dk;
  var log = D.dailyLogs[dk] || {};
  var date = parseLocalDate(dk);
  var dateStr = date.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  var hasAny = EX.some(function(e) { return (log[e.id] || 0) > 0; });
  var runKm = D.runningLogs[dk] || 0;

  if (!hasAny && runKm === 0) {
    document.getElementById('calDetail').classList.remove('show');
    selectedDay = null;
    return;
  }

  var h = '<div class="cal-detail-title">' + dateStr + '</div>';
  EX.forEach(function(e) {
    var done = log[e.id] || 0;
    var goal = D.goals[e.id];
    var hit = done >= goal;
    h += '<div class="cal-detail-row"><div class="cal-detail-label">' + e.icon + ' ' + e.label + '</div><div class="cal-detail-val ' + (done > 0 ? (hit ? 'hit' : 'miss') : '') + '">' + done + ' / ' + goal + '</div></div>';
  });
  if (runKm > 0) h += '<div class="cal-detail-row"><div class="cal-detail-label">🏃 Running</div><div class="cal-detail-val hit">' + runKm.toFixed(1) + ' km</div></div>';

  var el = document.getElementById('calDetail');
  el.innerHTML = h;
  el.classList.add('show');
}

/* ═══════════════════════════════════════════════════════════════════════════
   SQUAD SYSTEM — Real-time buddy progress via Firebase Realtime DB REST API
   
   HOW IT WORKS:
   1. You and Michael both set up Squad with the SAME room code
   2. Every time you log reps, your data is pushed to Firebase
   3. Your app polls Firebase every 30s to fetch Michael's latest data
   4. No SDK needed — plain fetch() against the Firebase REST API
   
   FIREBASE SETUP (free, ~2 minutes):
   1. Go to console.firebase.google.com → New project (any name)
   2. Build → Realtime Database → Create database → Start in TEST MODE
   3. Copy the database URL (looks like https://xxx-default-rtdb.firebaseio.com)
   4. Paste it into the Squad setup screen in the app
   ═══════════════════════════════════════════════════════════════════════════ */

var SQUAD_SK = 'fittrack-squad-v1';
var squadCfg = null;       // { myName, buddyName, room, firebaseUrl }
var buddyData = null;      // latest data fetched from Firebase for buddy
var squadPollTimer = null;

function loadSquadConfig() {
  try {
    var raw = localStorage.getItem(SQUAD_SK);
    squadCfg = raw ? JSON.parse(raw) : null;
  } catch(e) { squadCfg = null; }
}

function saveSquadConfig() {
  var myName = document.getElementById('squadMyName').value.trim();
  var buddyName = document.getElementById('squadBuddyName').value.trim();
  var room = document.getElementById('squadRoom').value.trim().replace(/\s+/g, '-');
  var url = document.getElementById('squadFirebaseUrl').value.trim().replace(/\/$/, '');

  if (!myName || !buddyName || !room || !url) {
    alert('Please fill in all fields.');
    return;
  }

  squadCfg = { myName: myName, buddyName: buddyName, room: room, firebaseUrl: url };
  localStorage.setItem(SQUAD_SK, JSON.stringify(squadCfg));
  document.getElementById('squadModal').classList.remove('show');
  squadPushMyData();
  startSquadPolling();
  render();
}

function squadFirebasePath(name) {
  // Sanitise name for Firebase key (no . # $ [ ] /)
  var key = name.replace(/[.#$\[\]\/]/g, '_').toLowerCase();
  return squadCfg.firebaseUrl + '/rooms/' + encodeURIComponent(squadCfg.room) + '/' + key + '.json';
}

function squadPushMyData() {
  if (!squadCfg) return;
  var today = getTodayKey();
  var tl = getTodayLog();
  // Filter activity log to only today's entries (last 20 max)
  var todayStart = parseLocalDate(today).getTime();
  var todayEnd = todayStart + 86400000;
  var todayLog = (D.activityLog || []).filter(function(e) {
    return e.t >= todayStart && e.t < todayEnd;
  }).slice(-20);
  var payload = {
    name: squadCfg.myName,
    date: today,
    pushups: tl.pushups || 0,
    pullups: tl.pullups || 0,
    squats: tl.squats || 0,
    runKm: D.runningLogs[today] || 0,
    goals: { pushups: D.goals.pushups, pullups: D.goals.pullups, squats: D.goals.squats },
    activity: todayLog,
    ts: Date.now()
  };
  fetch(squadFirebasePath(squadCfg.myName), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(function() { /* silent fail — offline */ });
}

function squadFetchBuddy() {
  if (!squadCfg) return;
  fetch(squadFirebasePath(squadCfg.buddyName))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.ts) {
        var today = getTodayKey();
        var newBuddy = (data.date === today) ? data : null;
        // Only update DOM if data actually changed
        var oldTs = buddyData ? buddyData.ts : 0;
        var newTs = newBuddy ? newBuddy.ts : 0;
        if (newTs !== oldTs) {
          buddyData = newBuddy;
          updateSquadCard();
        }
      }
    })
    .catch(function() { /* offline */ });
}

// Lightweight update — only replaces the squad card, not the full page
function updateSquadCard() {
  var squadEl = document.querySelector('.squad-card');
  if (squadEl) {
    var wrapper = document.createElement('div');
    wrapper.innerHTML = renderSquadCard();
    squadEl.replaceWith(wrapper.firstElementChild);
  }
}

function startSquadPolling() {
  if (squadPollTimer) clearInterval(squadPollTimer);
  if (!squadCfg) return;
  squadFetchBuddy(); // immediate fetch
  squadPollTimer = setInterval(squadFetchBuddy, 3000); // every 3s for near-real-time
}

function openSquadModal() {
  if (squadCfg) {
    document.getElementById('squadMyName').value = squadCfg.myName;
    document.getElementById('squadBuddyName').value = squadCfg.buddyName;
    document.getElementById('squadRoom').value = squadCfg.room;
    document.getElementById('squadFirebaseUrl').value = squadCfg.firebaseUrl;
  }
  document.getElementById('squadModal').classList.add('show');
}

function formatActivityTime(ts) {
  var d = new Date(ts);
  var h = d.getHours(), m = d.getMinutes();
  var ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return h + ':' + String(m).padStart(2, '0') + ampm;
}

function getExLabel(id) {
  if (id === 'run') return '🏃 Run';
  var ex = EX.find(function(e) { return e.id === id; });
  return ex ? ex.icon + ' ' + ex.label : id;
}

function renderActivityFeed() {
  var today = getTodayKey();
  var todayStart = parseLocalDate(today).getTime();
  var todayEnd = todayStart + 86400000;

  // Collect my activity
  var myActs = (D.activityLog || []).filter(function(e) {
    return e.t >= todayStart && e.t < todayEnd;
  }).map(function(e) {
    return { who: 'me', name: squadCfg.myName, id: e.id, n: e.n, t: e.t };
  });

  // Collect buddy activity
  var buddyActs = [];
  if (buddyData && buddyData.activity) {
    buddyActs = buddyData.activity.map(function(e) {
      return { who: 'buddy', name: squadCfg.buddyName, id: e.id, n: e.n, t: e.t };
    });
  }

  // Merge and sort by time descending (most recent first)
  var all = myActs.concat(buddyActs).sort(function(a, b) { return b.t - a.t; });
  if (all.length === 0) return '';

  var html = '<div class="squad-feed"><div class="squad-feed-title">⚡ Live Activity</div>';
  all.slice(0, 20).forEach(function(a) {
    var unit = a.id === 'run' ? 'km' : '';
    var val = a.id === 'run' ? (+a.n).toFixed(1) + unit : '+' + a.n;
    html += '<div class="squad-feed-item ' + a.who + '"><span>' +
      (a.who === 'me' ? '🟣' : '🟡') + ' ' + a.name + ' — ' + getExLabel(a.id) + ' ' + val +
      '</span><span class="squad-feed-time">' + formatActivityTime(a.t) + '</span></div>';
  });
  html += '</div>';
  return html;
}

function renderSquadCard() {
  if (!squadCfg) {
    return '<div class="squad-card"><div class="squad-header"><div class="squad-icon">👥</div><div><div class="squad-title">Squad</div><div class="squad-sub">See each other\'s progress live</div></div></div>' +
      '<div class="squad-status">Connect with a mate — you\'ll see their reps update in real time</div>' +
      '<button class="squad-setup-btn" onclick="openSquadModal()">🔗 Set Up Squad</button></div>';
  }

  var today = getTodayKey();
  var tl = getTodayLog();
  var runKm = D.runningLogs[today] || 0;

  // My column
  var myCol = '<div class="squad-col"><div class="squad-col-name me">🟣 ' + squadCfg.myName + ' (you)</div>';
  EX.forEach(function(e) {
    var done = tl[e.id] || 0;
    var goal = D.goals[e.id];
    var pct = goal > 0 ? Math.round(done / goal * 100) : 0;
    myCol += '<div class="squad-row"><span>' + e.icon + ' ' + e.label + '</span><span>' + done + ' <span style="color:#a78bfa;font-size:11px">(' + pct + '%)</span></span></div>';
  });
  if (runKm > 0) myCol += '<div class="squad-row"><span>🏃 Run</span><span>' + runKm.toFixed(1) + 'km</span></div>';
  myCol += '</div>';

  // Buddy column
  var buddyCol = '<div class="squad-col"><div class="squad-col-name buddy">🟡 ' + squadCfg.buddyName + '</div>';
  if (buddyData) {
    EX.forEach(function(e) {
      var done = buddyData[e.id] || 0;
      var goal = (buddyData.goals && buddyData.goals[e.id]) || 0;
      var pct = goal > 0 ? Math.round(done / goal * 100) : 0;
      buddyCol += '<div class="squad-row"><span>' + e.icon + ' ' + e.label + '</span><span>' + done + (goal > 0 ? ' <span style="color:#a78bfa;font-size:11px">(' + pct + '%)</span>' : '') + '</span></div>';
    });
    if ((buddyData.runKm || 0) > 0) buddyCol += '<div class="squad-row"><span>🏃 Run</span><span>' + (buddyData.runKm).toFixed(1) + 'km</span></div>';
    var minsAgo = Math.round((Date.now() - buddyData.ts) / 60000);
    buddyCol += '</div>';
    var lastSeen = minsAgo < 1 ? 'just now' : minsAgo < 60 ? minsAgo + 'm ago' : Math.round(minsAgo/60) + 'h ago';
    return '<div class="squad-card"><div class="squad-header"><div class="squad-icon">👥</div><div><div class="squad-title">Squad</div><div class="squad-sub">🟢 Live • updates every 3s</div></div><button onclick="openSquadModal()" style="margin-left:auto;background:rgba(139,92,246,.12);border:none;border-radius:10px;padding:6px 12px;color:#6d28d9;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit">Edit</button></div>' +
      '<div class="squad-grid">' + myCol + buddyCol + '</div>' +
      renderActivityFeed() +
      renderReactionBar() +
      '<div class="squad-last-seen">Last seen ' + squadCfg.buddyName + ': ' + lastSeen + '</div></div>';
  } else {
    buddyCol += '<div style="color:#a78bfa;font-size:13px;font-weight:600;padding:8px 0">Waiting for today\'s data…</div></div>';
    return '<div class="squad-card"><div class="squad-header"><div class="squad-icon">👥</div><div><div class="squad-title">Squad</div><div class="squad-sub">⏳ Waiting for buddy…</div></div><button onclick="openSquadModal()" style="margin-left:auto;background:rgba(139,92,246,.12);border:none;border-radius:10px;padding:6px 12px;color:#6d28d9;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit">Edit</button></div>' +
      '<div class="squad-grid">' + myCol + buddyCol + '</div>' +
      renderActivityFeed() +
      renderReactionBar() +
      '<div class="squad-last-seen">No data from ' + squadCfg.buddyName + ' today yet</div></div>';
  }
}

// Init squad on load
loadSquadConfig();
if (squadCfg) startSquadPolling();

/* ═══════════════════════════════════════════════════════════════════════════
   EMOJI REACTIONS — Send emoji + optional message to your buddy via Firebase
   
   HOW IT WORKS:
   1. You tap an emoji (or type a message + emoji) → written to Firebase
   2. Buddy's app polls a separate "reactions" node every 3s
   3. When a new reaction is detected, it pops up as an animated overlay
   4. Each reaction has a timestamp — only new ones trigger the popup
   ═══════════════════════════════════════════════════════════════════════════ */

var REACT_EMOJIS = ['🔥', '💀', '😤', '👑', '💪', '🐌', '😂', '🫡'];
var lastReactionTs = 0; // track last seen reaction to avoid re-showing

function squadReactPath(targetName) {
  var key = targetName.replace(/[.#$\[\]\/\s]/g, '').toLowerCase();
  return squadCfg.firebaseUrl + '/rooms/' + encodeURIComponent(squadCfg.room) + '/reactions_' + key + '.json';
}

function sendReaction(emoji) {
  if (!squadCfg) return;
  var msgInput = document.getElementById('squadMsgInput');
  var msg = msgInput ? msgInput.value.trim() : '';
  var payload = {
    from: squadCfg.myName,
    emoji: emoji,
    msg: msg,
    ts: Date.now()
  };
  // Write to buddy's reaction node (they poll this)
  fetch(squadReactPath(squadCfg.buddyName), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(function() {});
  if (msgInput) msgInput.value = '';
  showToast('Sent ' + emoji + ' to ' + squadCfg.buddyName);
}

function checkIncomingReactions() {
  if (!squadCfg) return;
  // Poll MY reaction node (buddy writes here)
  fetch(squadReactPath(squadCfg.myName))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.ts && data.ts > lastReactionTs) {
        lastReactionTs = data.ts;
        showIncomingReaction(data);
      }
    })
    .catch(function() {});
}

function showIncomingReaction(data) {
  var el = document.getElementById('squadIncoming');
  document.getElementById('squadIncomingEmoji').textContent = data.emoji || '🔥';
  document.getElementById('squadIncomingFrom').textContent = data.from || 'Buddy';
  var msgEl = document.getElementById('squadIncomingMsg');
  msgEl.textContent = data.msg || '';
  msgEl.style.display = data.msg ? 'block' : 'none';
  el.classList.add('show');
  // Vibrate if supported
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function renderReactionBar() {
  if (!squadCfg) return '';
  var html = '<div class="squad-react-bar">';
  REACT_EMOJIS.forEach(function(e) {
    html += '<button class="squad-react-btn" onclick="sendReaction(\'' + e + '\')">' + e + '</button>';
  });
  html += '</div>';
  html += '<div class="squad-msg-row"><input type="text" class="squad-msg-input" id="squadMsgInput" placeholder="Talk smack..." maxlength="100"><button class="squad-msg-send" onclick="sendReaction(\'💬\')">Send</button></div>';
  return html;
}

// Start polling for incoming reactions alongside buddy data
var reactionPollTimer = null;
function startReactionPolling() {
  if (reactionPollTimer) clearInterval(reactionPollTimer);
  if (!squadCfg) return;
  checkIncomingReactions();
  reactionPollTimer = setInterval(checkIncomingReactions, 3000);
}

// Hook into squad startup
(function() {
  var origStart = startSquadPolling;
  startSquadPolling = function() {
    origStart();
    startReactionPolling();
  };
  // If already started, kick off reaction polling too
  if (squadCfg) startReactionPolling();
}());
</script>
</body>
</html>
