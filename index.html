<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#3B82F6">
<title>FitTrack</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --c1:#3B82F6;--c2:#EC4899;--c3:#06B6D4;--c4:#10B981;
  --bg:#f5f7ff;--bg2:#eef2ff;--bg3:#e0e7ff;
  --card:#ffffff;--card2:#f8f9ff;--card3:#f0f3ff;
  --border:rgba(59,130,246,0.18);
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --grad:linear-gradient(135deg,#3B82F6,#6366F1);
  --grad2:linear-gradient(135deg,#06B6D4,#3B82F6);
  --grad3:linear-gradient(135deg,#10B981,#06B6D4);
  --glow:rgba(59,130,246,0.25);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Space Grotesk',system-ui,sans-serif}
body{background:var(--bg);min-height:100vh;min-height:100dvh;overflow-x:hidden;color:var(--text)}
.pages-wrap{display:flex;width:200vw;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.pages-wrap.on-cal{transform:translateX(-100vw)}
.page{width:100vw;min-height:100vh;min-height:100dvh;flex-shrink:0;background:var(--bg)}

.page-dots{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:90}
.page-dot{width:8px;height:8px;border-radius:50%;background:rgba(59,130,246,.25);transition:all .3s;cursor:pointer}
.page-dot.active{background:var(--c1);width:24px;border-radius:4px}

/* ── HEADER ── */
.header{background:linear-gradient(160deg,#e0e7ff 0%,#dbeafe 50%,#e0f2fe 100%);padding:20px 20px 26px;border-radius:0 0 32px 32px;border-bottom:1px solid var(--border);box-shadow:0 8px 40px rgba(59,130,246,.12),0 1px 0 rgba(59,130,246,.1) inset}
.header-top{display:flex;justify-content:space-between;align-items:center;padding-top:max(4px,env(safe-area-inset-top))}
.app-title{font-weight:900;font-size:28px;letter-spacing:-1px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-date{font-size:12px;color:var(--text3);font-weight:500;margin-top:2px;letter-spacing:.3px}
.goals-btn{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.35);border-radius:20px;padding:9px 18px;color:var(--text);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.goals-btn:active{background:rgba(59,130,246,.3)}
.mini-bars{display:flex;gap:8px;margin-top:16px}
.mini-bar{flex:1;background:rgba(59,130,246,.07);border:1px solid var(--border);border-radius:16px;padding:10px 8px;text-align:center}
.mini-bar-num{font-size:12px;font-weight:700;color:var(--text)}
.mini-bar-track{height:4px;background:rgba(59,130,246,.12);border-radius:4px;margin-top:6px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:4px;background:var(--grad);transition:width .5s cubic-bezier(.4,0,.2,1)}
.mini-bar-fill.done{background:var(--grad3)}
.mini-bar-label{font-size:9px;color:var(--text3);font-weight:600;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.all-done{margin-top:12px;background:rgba(16,185,129,.1);border-radius:14px;padding:10px 16px;text-align:center;font-weight:700;font-size:13px;color:#10B981;border:1px solid rgba(16,185,129,.25);display:none;letter-spacing:.2px}
.all-done.show{display:block;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.tracking-label{margin-top:8px;text-align:center;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* ── CONTENT ── */
.content{padding:18px 14px 100px;max-width:480px;margin:0 auto}

/* ── CARDS ── */
.card{background:var(--card);border-radius:24px;padding:20px 16px;box-shadow:0 4px 24px rgba(100,60,200,.1);margin-bottom:12px;transition:border-color .3s;border:1px solid var(--border)}
.card.complete{border-color:rgba(16,185,129,.4);box-shadow:0 4px 24px rgba(16,185,129,.08)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;justify-content:center}
.card-title{font-weight:800;font-size:17px;color:var(--text)}

/* ── RING ── */
.ring-wrap{position:relative;width:130px;height:130px;margin:0 auto 12px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(59,130,246,.12);stroke-width:10}
.ring-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-weight:900;font-size:28px;color:var(--text);line-height:1}
.ring-num.done{color:#10B981}
.ring-goal{font-size:12px;color:var(--text3);font-weight:600;margin-top:2px}
.goal-badge{font-size:12px;font-weight:700;color:#10B981;background:rgba(16,185,129,.1);padding:4px 16px;border-radius:20px;text-align:center;margin-bottom:8px;border:1px solid rgba(16,185,129,.2)}

/* ── EXERCISE OVERVIEW ROW ── */
.ex-overview{display:flex;justify-content:center;gap:8px;margin-bottom:14px}
.ex-ring-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.ex-ring-label{font-family:'Space Grotesk',system-ui,sans-serif;font-weight:800;font-size:12px;color:var(--text);text-align:center}
.ring-num-sm{font-size:20px}

/* ── COMPACT INPUT SECTIONS ── */
.ex-input-section{margin-bottom:10px;padding:14px;background:var(--card);border-radius:18px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(59,130,246,.06)}
.ex-input-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ex-input-title{font-weight:800;font-size:15px;color:var(--text)}
.ex-input-count{margin-left:auto;font-weight:900;font-size:15px}
.ex-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── QUICK BUTTONS ── */
.quick-adds{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.quick-btn{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);border-radius:14px;padding:9px 15px;font-weight:700;font-size:14px;color:var(--text);cursor:pointer;font-family:inherit;transition:all .15s}
.quick-btn:active{transform:scale(.93);background:rgba(59,130,246,.3)}

.input-row{display:flex;gap:6px}
.input-row input{flex:1;border:1px solid rgba(59,130,246,.25);border-radius:14px;padding:10px 14px;font-size:15px;font-family:inherit;outline:none;background:#fff;color:var(--text);font-weight:600}
.input-row input::placeholder{color:var(--text3)}
.input-row input:focus{border-color:var(--c1)}
.add-btn{background:var(--grad);border:none;border-radius:14px;padding:10px 20px;color:#fff;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px var(--glow);transition:all .15s}
.add-btn:active{transform:scale(.93);opacity:.9}

/* ── RUN ── */
.run-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.run-icon{width:44px;height:44px;border-radius:14px;background:var(--grad2);display:flex;align-items:center;justify-content:center;font-size:22px}
.run-title{font-weight:800;font-size:17px;color:var(--text)}
.run-sub{font-size:12px;color:var(--text2);font-weight:500}
.run-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.run-stat{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.12);border-radius:16px;padding:12px 8px;text-align:center}
.run-stat-label{font-size:10px;color:var(--text2);font-weight:600;margin-bottom:4px;letter-spacing:.4px;text-transform:uppercase}
.run-stat-val{font-size:20px;font-weight:900;color:var(--c3)}
.run-stat-unit{font-size:11px;color:var(--text3);font-weight:600}

/* ── STATS ── */
.stats-title{font-weight:800;font-size:17px;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stats-table{width:100%;border-collapse:collapse;margin-bottom:14px}
.stats-table th{text-align:center;padding:8px 6px;font-size:11px;color:var(--text3);font-weight:700;border-bottom:1px solid rgba(59,130,246,.1);letter-spacing:.5px;text-transform:uppercase}
.stats-table th:first-child{text-align:left}
.stats-table td{padding:10px 6px;font-weight:600;font-size:13px;color:var(--text2)}
.stats-table td:not(:first-child){text-align:center;font-weight:800;font-size:15px;color:var(--text)}
/* ── STAT EX CARDS ── */
.stat-ex-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.stat-ex-card{border-radius:18px;padding:14px 16px;border:1px solid var(--border)}
.stat-ex-card:nth-child(1){background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(236,72,153,.06));border-color:rgba(59,130,246,.25)}
.stat-ex-card:nth-child(2){background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(59,130,246,.06));border-color:rgba(6,182,212,.25)}
.stat-ex-card:nth-child(3){background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(6,182,212,.06));border-color:rgba(16,185,129,.25)}
.stat-ex-name{font-weight:800;font-size:13px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-ex-nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.stat-ex-num{text-align:center;padding:10px 4px;border-radius:14px}
.stat-ex-num:nth-child(1){background:rgba(59,130,246,.12)}
.stat-ex-num:nth-child(2){background:rgba(236,72,153,.12)}
.stat-ex-num:nth-child(3){background:rgba(6,182,212,.12)}
.stat-ex-val{font-weight:900;font-size:26px;color:var(--text);line-height:1}
.stat-ex-num:nth-child(1) .stat-ex-val{color:#3B82F6}
.stat-ex-num:nth-child(2) .stat-ex-val{color:#EC4899}
.stat-ex-num:nth-child(3) .stat-ex-val{color:#06B6D4}
.stat-ex-period{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-top:4px}
.totals-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.total-box{background:rgba(59,130,246,.08);border:1px solid var(--border);border-radius:16px;padding:14px 12px;text-align:center}
.total-label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.3px}
.total-val{font-size:26px;font-weight:900;color:var(--text)}
.reset-btn{display:block;margin:32px auto 0;background:transparent;border:1px solid rgba(59,130,246,.15);border-radius:14px;padding:10px 24px;color:var(--text3);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}

/* ── LAZY BANNER ── */
.lazy-banner{border-radius:24px;overflow:hidden;margin-bottom:12px;border:2px solid rgba(239,68,68,.4);box-shadow:0 4px 32px rgba(239,68,68,.15);animation:slideIn .4s ease}
.lazy-img{width:100%;display:block;height:200px;object-fit:cover;object-position:top center}
.lazy-text{background:rgba(239,68,68,.1);padding:12px 16px;text-align:center}
.lazy-title{font-weight:900;font-size:18px;color:#ef4444;letter-spacing:-.3px}
.lazy-sub{font-size:12px;color:var(--text2);font-weight:600;margin-top:3px}

/* ── REMINDERS ── */
.reminder{border-radius:18px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;animation:slideIn .4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.reminder-icon{font-size:22px;flex-shrink:0}
.reminder-text{font-size:13px;font-weight:600;line-height:1.4;color:var(--text2)}
.reminder-title{font-weight:800;font-size:14px;margin-bottom:2px;color:var(--text)}
.reminder.morning{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2)}
.reminder.nudge{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2)}
.reminder.evening{background:rgba(236,72,153,.08);border:1px solid rgba(236,72,153,.2)}
.reminder.streak{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2)}

/* ── SUGGESTIONS ── */
.suggest-banner{background:rgba(251,191,36,.06);border-radius:20px;padding:16px;border:1px solid rgba(251,191,36,.2);margin-bottom:12px}
.suggest-title{font-weight:800;font-size:14px;color:#FBB024;margin-bottom:12px}
.suggest-item{background:rgba(59,130,246,.05);border-radius:14px;padding:12px 14px;margin-bottom:8px;border:1px solid rgba(59,130,246,.1)}
.suggest-msg{font-size:13px;color:var(--text2);font-weight:600;margin-bottom:8px}
.suggest-btns{display:flex;gap:8px}
.suggest-accept{background:#10B981;border:none;border-radius:10px;padding:6px 16px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.suggest-dismiss{background:rgba(59,130,246,.08);border:none;border-radius:10px;padding:6px 16px;color:var(--text2);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}

/* ── TOAST ── */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(40px);opacity:0;background:var(--card2);color:var(--text);border:1px solid var(--border);padding:12px 24px;border-radius:50px;font-weight:700;font-size:14px;box-shadow:0 8px 32px rgba(100,60,200,.2);z-index:999;pointer-events:none;white-space:nowrap;transition:all .4s cubic-bezier(.4,0,.2,1)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── MODALS ── */
.modal-bg{position:fixed;inset:0;background:rgba(90,60,180,.35);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:28px;padding:30px 22px;max-width:380px;width:100%;box-shadow:0 24px 64px rgba(100,60,200,.2);animation:modalIn .3s ease;border:1px solid var(--border)}
@keyframes modalIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-weight:900;font-size:22px;color:var(--text);text-align:center;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:22px;font-weight:500}
.modal-label{font-weight:700;font-size:13px;color:var(--text2);display:block;margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
.modal-input{width:100%;border:1px solid rgba(59,130,246,.3);border-radius:14px;padding:12px 16px;font-size:18px;font-family:inherit;outline:none;font-weight:800;color:var(--text);background:#fff;margin-bottom:14px}
.modal-input::placeholder{color:var(--text3)}
.modal-input:focus{border-color:var(--c1)}
.modal-save{width:100%;background:var(--grad);border:none;border-radius:16px;padding:14px;color:#fff;font-weight:900;font-size:16px;cursor:pointer;font-family:inherit;margin-top:8px;box-shadow:0 6px 24px var(--glow)}
.squad-modal-label{font-weight:700;font-size:13px;color:var(--text2);display:block;margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
.squad-modal-input{width:100%;border:1px solid rgba(59,130,246,.3);border-radius:14px;padding:12px 16px;font-size:16px;font-family:inherit;outline:none;font-weight:700;color:var(--text);background:#fff;margin-bottom:14px}
.squad-modal-input::placeholder{color:var(--text3)}
.squad-modal-input:focus{border-color:var(--c1)}

/* ── CALENDAR ── */
.cal-header{background:linear-gradient(160deg,#e0e7ff 0%,#dbeafe 50%,#e0f2fe 100%);padding:20px 20px 24px;border-radius:0 0 32px 32px;border-bottom:1px solid var(--border);box-shadow:0 8px 32px rgba(59,130,246,.1)}
.cal-header-top{display:flex;justify-content:space-between;align-items:center;padding-top:max(4px,env(safe-area-inset-top))}
.cal-title{font-weight:900;font-size:22px;color:var(--text)}
.cal-back{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:14px;padding:8px 16px;color:var(--text);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.cal-nav-btn{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:12px;width:36px;height:36px;color:var(--text);font-size:18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.cal-month{font-weight:800;font-size:18px;color:var(--text)}
.cal-summary{display:flex;gap:8px;margin-top:14px}
.cal-sum-box{flex:1;background:rgba(59,130,246,.1);border:1px solid var(--border);border-radius:14px;padding:10px 8px;text-align:center}
.cal-sum-val{font-size:22px;font-weight:900;color:var(--text)}
.cal-sum-label{font-size:10px;color:var(--text3);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.cal-content{padding:18px 14px 100px;max-width:480px;margin:0 auto}
.cal-grid{background:var(--card);border-radius:22px;padding:16px 12px;box-shadow:0 4px 24px rgba(100,60,200,.08);margin-bottom:12px;border:1px solid var(--border)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:8px}
.cal-weekday{font-size:11px;font-weight:700;color:var(--text3);padding:6px 0;letter-spacing:.4px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;font-size:13px;font-weight:700;color:var(--text2);position:relative;transition:all .2s;cursor:pointer}
.cal-day.empty{visibility:hidden}
.cal-day.today{box-shadow:0 0 0 2px var(--c1);color:var(--text)}
.cal-day.hit{background:rgba(16,185,129,.12);color:#10B981}
.cal-day.miss{background:rgba(239,68,68,.07);color:#ef4444}
.cal-day.future{color:var(--text3)}
.cal-day .cal-icon{font-size:9px;margin-top:1px;line-height:1}
.cal-day.partial{background:rgba(251,191,36,.1);color:#FBB024}
.cal-legend{display:flex;gap:14px;justify-content:center;margin-top:12px}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text2)}
.cal-legend-dot{width:10px;height:10px;border-radius:5px}
.cal-day-detail{background:var(--card);border-radius:20px;padding:16px;box-shadow:0 4px 24px rgba(0,0,0,.25);margin-bottom:12px;display:none;border:1px solid var(--border)}
.cal-day-detail.show{display:block}
.cal-detail-title{font-weight:800;font-size:15px;color:var(--text);margin-bottom:10px}
.cal-detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(59,130,246,.08)}
.cal-detail-row:last-child{border:none}
.cal-detail-label{font-weight:600;font-size:13px;color:var(--text2)}
.cal-detail-val{font-weight:800;font-size:15px}
.cal-detail-val.hit{color:#10B981}
.cal-detail-val.miss{color:#ef4444}

input[type=number]{-moz-appearance:textfield;font-family:'Space Grotesk',system-ui,sans-serif}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input,button,select,textarea{font-family:'Space Grotesk',system-ui,sans-serif}

/* ══════════════════════════════════════════
   SQUAD — complete redesign
══════════════════════════════════════════ */
.squad-card{background:linear-gradient(160deg,#eef2ff,#e0f2fe,#f0fdf4);border-radius:24px;padding:18px 14px;box-shadow:0 4px 32px rgba(59,130,246,.1);margin-bottom:12px;border:1px solid rgba(59,130,246,.25)}
.squad-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.squad-icon{width:42px;height:42px;border-radius:14px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.squad-title{font-weight:900;font-size:16px;color:var(--text)}
.squad-sub{font-size:11px;color:var(--text2);font-weight:500;margin-top:1px}
.squad-edit-btn{margin-left:auto;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:12px;padding:7px 14px;color:var(--text);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
.squad-status{font-size:11px;color:var(--c1);text-align:center;margin-bottom:12px;font-weight:600}
.squad-setup-btn{width:100%;background:var(--grad);border:none;border-radius:16px;padding:13px;color:#fff;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px var(--glow);transition:transform .1s}
.squad-setup-btn:active{transform:scale(.97)}

/* Member grid */
.squad-members-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.squad-member-tile{background:#fff;border:1px solid rgba(59,130,246,.15);border-radius:18px;padding:11px 10px;box-shadow:0 2px 12px rgba(59,130,246,.06)}
.squad-member-tile.is-me{background:linear-gradient(135deg,rgba(59,130,246,.1),rgba(99,102,241,.06));border-color:rgba(59,130,246,.35)}
.squad-member-name{font-weight:800;font-size:13px;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.squad-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-me{background:var(--c1)}
.dot-buddy{background:#FBB024}
.squad-ex-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.squad-ex-label{font-size:11px;color:var(--text2);font-weight:600;white-space:nowrap}
.squad-ex-right{display:flex;align-items:center;gap:3px}
.squad-ex-val{font-size:12px;font-weight:900;color:var(--text)}
.squad-ex-pct{font-size:10px;color:var(--text3);font-weight:600}
.squad-rank{font-size:11px;margin-left:1px}
.squad-no-reps{font-size:12px;color:var(--text3);font-weight:600;padding:2px 0}
.squad-lastseen{font-size:10px;color:var(--text3);margin-top:6px}

/* Feed */
.squad-feed{margin-top:8px;max-height:160px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.squad-feed-title{font-weight:800;font-size:11px;color:var(--c2);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.squad-feed-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:10px;margin-bottom:3px;font-size:12px;font-weight:600}
.squad-feed-item.me{background:rgba(59,130,246,.1);color:var(--text)}
.squad-feed-item.buddy{background:rgba(251,176,36,.1);color:var(--text2)}
.squad-feed-time{font-size:10px;color:var(--text3);white-space:nowrap;margin-left:6px}

/* Chat Messages */
.squad-chat{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.squad-chat-title{font-weight:800;font-size:11px;color:var(--text2);margin-bottom:8px;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.squad-chat-messages{max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch;margin-bottom:8px}
.squad-chat-msg{padding:8px 10px;margin-bottom:6px;border-radius:12px;font-size:12px;line-height:1.4}
.squad-chat-msg.me{background:rgba(59,130,246,.15);color:var(--text);text-align:right}
.squad-chat-msg.buddy{background:rgba(251,176,36,.1);color:var(--text2);text-align:left}
.squad-chat-name{font-weight:700;font-size:10px;opacity:.7;margin-bottom:2px}
.squad-chat-time{font-size:9px;color:var(--text3);margin-top:2px;opacity:.6}

/* Reactions */
.squad-react-bar{display:flex;gap:5px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.squad-react-btn{background:#fff;border:1px solid rgba(59,130,246,.2);border-radius:12px;padding:7px 10px;font-size:18px;cursor:pointer;transition:transform .15s;line-height:1;box-shadow:0 2px 8px rgba(59,130,246,.08)}
.squad-react-btn:active{transform:scale(1.3)}
.squad-msg-row{display:flex;gap:6px;margin-top:8px}
.squad-msg-input{flex:1;border:1px solid rgba(59,130,246,.2);border-radius:12px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;font-weight:600;color:var(--text);background:#fff}
.squad-msg-input::placeholder{color:var(--text3)}
.squad-msg-input:focus{border-color:var(--c1)}
.squad-msg-send{background:var(--grad);border:none;border-radius:12px;padding:9px 16px;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit}
.squad-msg-send:active{transform:scale(.93)}

/* Incoming reaction popup */
.squad-incoming{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--card2);border:1px solid var(--border);border-radius:28px;padding:32px 40px;text-align:center;z-index:2000;box-shadow:0 24px 64px rgba(100,60,200,.25);pointer-events:none;opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1)}

/* ── LEADERBOARD ── */
.squad-leaderboard{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.squad-lb-title{font-weight:900;font-size:13px;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:.3px}
.squad-lb-exercise{border-radius:16px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border)}
.squad-lb-exercise:nth-child(2){background:linear-gradient(135deg,rgba(245,158,11,.07),rgba(249,115,22,.04));border-color:rgba(245,158,11,.2)}
.squad-lb-exercise:nth-child(3){background:linear-gradient(135deg,rgba(59,130,246,.07),rgba(99,102,241,.04));border-color:rgba(59,130,246,.2)}
.squad-lb-exercise:nth-child(4){background:linear-gradient(135deg,rgba(139,92,246,.07),rgba(236,72,153,.04));border-color:rgba(139,92,246,.2)}
.squad-lb-ex-name{font-weight:800;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.squad-lb-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(59,130,246,.07)}
.squad-lb-row:last-child{border:none}
.squad-lb-medal{font-size:16px;width:22px;flex-shrink:0;text-align:center}
.squad-lb-name{flex:1;font-weight:700;font-size:13px;color:var(--text)}
.squad-lb-me .squad-lb-name{color:var(--c1)}
.squad-lb-reps{font-weight:900;font-size:14px;color:var(--text2)}
.squad-lb-me .squad-lb-reps{color:var(--c1)}
.squad-incoming.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.squad-incoming-emoji{font-size:64px;line-height:1;margin-bottom:8px}
.squad-incoming-from{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px}
.squad-incoming-msg{font-size:15px;font-weight:600;color:var(--text2);max-width:240px;word-wrap:break-word}
</style>
</head>
<body>

<div class="pages-wrap" id="pagesWrap">
<div class="page" id="pageDash">

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">FitTrack</div>
      <div class="app-date" id="dateDisplay"></div>
    </div>
    <button class="goals-btn" onclick="openGoalModal()">⚙️ Goals</button>
  </div>
  <div class="mini-bars" id="miniBars"></div>
  <div class="all-done" id="allDone">🏆 All goals smashed! Legend.</div>
  <div class="tracking-label" id="trackingLabel"></div>
</div>

<div class="content" id="content"></div>

</div>
<div class="page" id="pageCal">

<div class="cal-header">
  <div class="cal-header-top">
    <button class="cal-back" onclick="goPage(0)">← Back</button>
    <div class="cal-title">📅 Calendar</div>
    <div style="width:70px"></div>
  </div>
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="calPrev()">‹</button>
    <div class="cal-month" id="calMonth"></div>
    <button class="cal-nav-btn" onclick="calNext()">›</button>
  </div>
  <div class="cal-summary" id="calSummary"></div>
</div>

<div class="cal-content">
  <div class="cal-grid">
    <div class="cal-weekdays">
      <div class="cal-weekday">Mon</div><div class="cal-weekday">Tue</div><div class="cal-weekday">Wed</div>
      <div class="cal-weekday">Thu</div><div class="cal-weekday">Fri</div><div class="cal-weekday">Sat</div><div class="cal-weekday">Sun</div>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>
  <div class="cal-legend">
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(16,185,129,.6)"></div>All hit</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(251,191,36,.6)"></div>Partial</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(239,68,68,.5)"></div>Missed</div>
  </div>
  <div class="cal-day-detail" id="calDetail"></div>
</div>

</div>
</div>

<div class="page-dots">
  <div class="page-dot active" id="dot0" onclick="goPage(0)"></div>
  <div class="page-dot" id="dot1" onclick="goPage(1)"></div>
</div>
<div class="toast" id="toast"></div>
<div class="squad-incoming" id="squadIncoming">
  <div class="squad-incoming-emoji" id="squadIncomingEmoji"></div>
  <div class="squad-incoming-from" id="squadIncomingFrom"></div>
  <div class="squad-incoming-msg" id="squadIncomingMsg"></div>
</div>

<div class="modal-bg" id="goalModal">
  <div class="modal">
    <div class="modal-title">Set Weekly Goals 🎯</div>
    <div class="modal-sub">Goals reset every 7 days</div>
    <label class="modal-label">💪 Push-ups</label>
    <input class="modal-input" type="number" inputmode="numeric" pattern="[0-9]*" id="goalPushups" min="1" value="100">
    <label class="modal-label">🏋️ Pull-ups</label>
    <input class="modal-input" type="number" inputmode="numeric" pattern="[0-9]*" id="goalPullups" min="1" value="30">
    <label class="modal-label">🦵 Squats</label>
    <input class="modal-input" type="number" inputmode="numeric" pattern="[0-9]*" id="goalSquats" min="1" value="80">
    <button class="modal-save" onclick="saveGoals()">Save Goals 💪</button>
  </div>
</div>

<div class="modal-bg" id="squadModal">
  <div class="modal">
    <div class="modal-title">👥 Squad Setup</div>
    <div class="modal-sub">Same room code = you all see each other</div>
    <label class="squad-modal-label">Your name</label>
    <input class="squad-modal-input" type="text" id="squadMyName" placeholder="e.g. Evan" maxlength="20">
    <label class="squad-modal-label">Room code</label>
    <input class="squad-modal-input" type="text" id="squadRoom" placeholder="e.g. fitmates-2025" maxlength="40">
    <button class="modal-save" onclick="saveSquadConfig()">Join Room 👥</button>
    <button class="reset-btn" style="margin-top:10px" onclick="document.getElementById('squadModal').classList.remove('show')">Cancel</button>
  </div>
</div>

/* ══ DATE HELPERS ══ */
function getLocalDateKey(d) {
  d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function getLocalWeekKey(d) {
  d = new Date(d || new Date()); d.setHours(0,0,0,0);
  var dow = d.getDay(), diff = d.getDate() - dow + (dow===0?-6:1);
  d.setDate(diff); return getLocalDateKey(d);
}
function getLocalYearKey(d) { return (d||new Date()).getFullYear().toString(); }
function parseLocalDate(dk) { var p=dk.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }

/* ══ DATA ══ */
function defaultData() {
  return { goals:{pushups:100,pullups:30,squats:80}, goalWeekStart:getLocalWeekKey(),
    activeDate:getLocalDateKey(), dailyLogs:{}, runningLogs:{}, dismissed:{}, activityLog:[] };
}
var D;
function loadData() {
  try {
    var s = localStorage.getItem(SK);
    if (s) { D = Object.assign(defaultData(), JSON.parse(s)); }
    else {
      var old = localStorage.getItem('fittrack-data');
      D = old ? Object.assign(defaultData(), JSON.parse(old)) : defaultData();
      if (old) saveData();
    }
  } catch(e) { D = defaultData(); }
}
function saveData() { try { localStorage.setItem(SK, JSON.stringify(D)); } catch(e) {} }

/* ══ ROLLOVER ══ */
function ensureTodayExists() {
  var today = getLocalDateKey();
  if (!D.dailyLogs[today]) { D.dailyLogs[today] = {}; EX.forEach(function(e){D.dailyLogs[today][e.id]=0;}); }
  EX.forEach(function(e){ if(typeof D.dailyLogs[today][e.id]!=='number') D.dailyLogs[today][e.id]=0; });
}
function rolloverIfNeeded() {
  var today = getLocalDateKey(), lastActive = D.activeDate || today;
  if (lastActive === today) { ensureTodayExists(); return false; }
  D.activeDate = today; ensureTodayExists(); saveData(); return true;
}
function getTodayLog() { ensureTodayExists(); return D.dailyLogs[getLocalDateKey()]; }
function getTodayKey() { return getLocalDateKey(); }

/* ══ LOGGING ══ */
function logEx(id, n) {
  n = parseInt(n);
  if (!(n > 0)) return;
  rolloverIfNeeded();
  var today = getTodayKey();
  var prev = D.dailyLogs[today][id] || 0;
  D.dailyLogs[today][id] = prev + n;

  // Push to activityLog immediately before saveData
  if (!D.activityLog) D.activityLog = [];
  D.activityLog.push({ id: id, n: n, t: Date.now() });
  if (D.activityLog.length > 50) D.activityLog = D.activityLog.slice(-50);
  saveData();

  var total = D.dailyLogs[today][id], goal = D.goals[id];
  var ex = EX.find(function(e){return e.id===id;});
  if (total >= goal && prev < goal) showToast(ex.label + ' goal smashed! 🎉');
  else { var p=['Nice set!','Keep pushing!','Solid work!','Strong! 💪',"Let's go!"]; showToast(p[Math.floor(Math.random()*p.length)]); }
  squadPushMyData();
  render();
}

function addInp(id) {
  var i = document.getElementById('inp-' + id);
  var val = i.value;
  i.value = '';
  logEx(id, val);
}

function logRun(km) {
  km = parseFloat(km);
  if (!(km > 0)) return;
  rolloverIfNeeded();
  var today = getTodayKey();
  D.runningLogs[today] = (D.runningLogs[today] || 0) + km;
  if (!D.activityLog) D.activityLog = [];
  D.activityLog.push({ id: 'run', n: km, t: Date.now() });
  if (D.activityLog.length > 50) D.activityLog = D.activityLog.slice(-50);
  saveData();
  showToast('+' + km + 'km logged! 🏃');
  squadPushMyData();
  render();
}
function addRunInp() { var i=document.getElementById('inp-run'); var v=i.value; i.value=''; logRun(v); }

/* ══ TOAST ══ */
var toastTimer;
function showToast(m) {
  var e=document.getElementById('toast'); e.textContent='🔥 '+m; e.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){e.classList.remove('show');},1800);
}

/* ══ RING ══ */
function ringH(id, cur, goal, opts) {
  opts=opts||{};
  var sz=opts.size||130,sw=opts.sw||10,r=(sz-sw)/2,cx=sz/2,c=2*Math.PI*r,p=goal>0?Math.min(1,cur/goal):0,o=c-p*c;
  var dn=cur>=goal&&goal>0;
  var col1=opts.color||'#3B82F6',col2=opts.color2||'#6366F1';
  var gradId='rg'+id+(opts.mini?'m':'');
  var grad='<defs><linearGradient id="'+gradId+'" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="'+col1+'"/><stop offset="100%" stop-color="'+col2+'"/></linearGradient></defs>';
  var stroke=dn?'#10B981':'url(#'+gradId+')';
  var wrapStyle=opts.size?'width:'+sz+'px;height:'+sz+'px':'';
  var numClass='ring-num'+(dn?' done':'')+(opts.mini?' ring-num-sm':'');
  return '<div class="ring-wrap" style="'+wrapStyle+'"><svg width="'+sz+'" height="'+sz+'">'+grad+'<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" class="ring-bg" stroke-width="'+sw+'"/><circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" class="ring-fg" stroke="'+stroke+'" stroke-width="'+sw+'" stroke-dasharray="'+c+'" stroke-dashoffset="'+o+'" stroke-linecap="round"/></svg><div class="ring-text"><span class="'+numClass+'">'+cur+'</span><span class="ring-goal"'+(opts.mini?' style="font-size:10px"':'')+'>/ '+goal+'</span></div></div>';
}

/* ══ GOALS MODAL ══ */
function openGoalModal() {
  document.getElementById('goalPushups').value=D.goals.pushups;
  document.getElementById('goalPullups').value=D.goals.pullups;
  document.getElementById('goalSquats').value=D.goals.squats;
  document.getElementById('goalModal').classList.add('show');
}
function saveGoals() {
  D.goals.pushups=parseInt(document.getElementById('goalPushups').value)||100;
  D.goals.pullups=parseInt(document.getElementById('goalPullups').value)||30;
  D.goals.squats=parseInt(document.getElementById('goalSquats').value)||80;
  D.goalWeekStart=getLocalWeekKey(); D.dismissed={}; saveData();
  document.getElementById('goalModal').classList.remove('show'); render();
}

/* ══ SUGGESTIONS ══ */
function getSugg() {
  var wk=getLocalWeekKey(),gs=D.goalWeekStart; if(!gs) return [];
  var gsDate=parseLocalDate(gs),daysSince=Math.floor((new Date()-gsDate)/86400000);
  if(daysSince<7) return [];
  var out=[];
  EX.forEach(function(ex){
    if(D.dismissed[ex.id+'-'+wk]) return;
    var hit=0;
    for(var i=0;i<7;i++){var d=new Date(gsDate);d.setDate(d.getDate()+i);var l=D.dailyLogs[getLocalDateKey(d)]||{};if((l[ex.id]||0)>=D.goals[ex.id])hit++;}
    var cur=D.goals[ex.id];
    if(hit/7>=0.7){var inc=Math.max(1,Math.round(cur*.1));out.push({id:ex.id,label:ex.label,icon:ex.icon,msg:'Hit '+ex.label.toLowerCase()+' goal '+hit+'/7 days. Increase '+cur+'→'+(cur+inc)+'?',ng:cur+inc,up:true});}
    else{out.push({id:ex.id,label:ex.label,icon:ex.icon,msg:ex.label+' goal was tough ('+hit+'/7). Keep at '+cur+'?',ng:cur,up:false});}
  });
  return out;
}
function acceptS(id,ng){var wk=getLocalWeekKey();D.goals[id]=ng;D.goalWeekStart=wk;D.dismissed[id+'-'+wk]=true;saveData();render();}
function dismissS(id){var wk=getLocalWeekKey();D.goalWeekStart=wk;D.dismissed[id+'-'+wk]=true;saveData();render();}

/* ══ STATS ══ */
function computeStats() {
  var today=getTodayKey(),wk=getLocalWeekKey(),yr=getLocalYearKey(),tl=getTodayLog();
  var wT={},yT={}; EX.forEach(function(e){wT[e.id]=0;yT[e.id]=0;});
  Object.keys(D.dailyLogs).forEach(function(dk){
    var log=D.dailyLogs[dk],d=parseLocalDate(dk);
    EX.forEach(function(e){
      if(getLocalWeekKey(d)===wk) wT[e.id]+=(log[e.id]||0);
      if(getLocalYearKey(d)===yr) yT[e.id]+=(log[e.id]||0);
    });
  });
  var rT=D.runningLogs[today]||0,rW=0,rY=0;
  Object.keys(D.runningLogs).forEach(function(dk){
    var d=parseLocalDate(dk);
    if(getLocalWeekKey(d)===wk) rW+=D.runningLogs[dk];
    if(getLocalYearKey(d)===yr) rY+=D.runningLogs[dk];
  });
  return {tl:tl,wT:wT,yT:yT,rT:rT,rW:rW,rY:rY,
    twk:EX.reduce(function(s,e){return s+wT[e.id];},0),
    tyr:EX.reduce(function(s,e){return s+yT[e.id];},0)};
}

/* ══ REMINDERS ══ */
function getReminders() {
  var hr=new Date().getHours(),tl=getTodayLog();
  var totalDone=EX.reduce(function(s,e){return s+(tl[e.id]||0);},0);
  var totalGoal=EX.reduce(function(s,e){return s+D.goals[e.id];},0);
  var pct=totalGoal>0?totalDone/totalGoal:0;
  var allDone=EX.every(function(e){return(tl[e.id]||0)>=D.goals[e.id];});
  var rems=[];
  var streak=0;
  for(var i=1;i<=30;i++){var d=new Date();d.setDate(d.getDate()-i);var log=D.dailyLogs[getLocalDateKey(d)]||{};if(EX.every(function(e){return(log[e.id]||0)>=D.goals[e.id];}))streak++;else break;}
  if(allDone){if(streak>=2)rems.push({type:'streak',icon:'🔥',title:streak+' day streak!',msg:"You're on fire! All goals smashed "+streak+" days in a row."});return rems;}
  if(hr>=5&&hr<12&&totalDone===0){var msgs=['Rise and grind! Your goals are waiting.','Good morning! Fresh day, fresh goals.','New day, new gains. Log that first set!'];rems.push({type:'morning',icon:'☀️',title:'Good morning!',msg:msgs[Math.floor(Math.random()*msgs.length)]});}
  if(hr>=12&&hr<17&&totalDone>0&&pct<1){var cl=EX.reduce(function(b,e){var p=(tl[e.id]||0)/D.goals[e.id];return p>b.p&&p<1?{id:e.id,label:e.label,p:p,left:D.goals[e.id]-(tl[e.id]||0)}:b;},{p:0,label:'',left:0});if(cl.label)rems.push({type:'nudge',icon:'💪',title:'Keep pushing!',msg:"You're "+Math.round(pct*100)+"% done. Only "+cl.left+" "+cl.label.toLowerCase()+" left!"});}
  if(hr>=12&&hr<17&&totalDone===0)rems.push({type:'nudge',icon:'🎯',title:'Afternoon check-in',msg:'No reps yet. Even one set counts — go!'});
  if(hr>=17&&hr<23&&pct<1){if(totalDone===0)rems.push({type:'evening',icon:'⏰',title:"Don't miss today!",msg:'No reps logged. Squeeze in a few sets!'});else rems.push({type:'evening',icon:'🏁',title:'Almost there!',msg:"Done "+totalDone+" reps. "+(totalGoal-totalDone)+" more to go!"});}
  if(streak>=2&&!allDone)rems.push({type:'streak',icon:'🔥',title:'Protect your '+streak+' day streak!',msg:"Don't break the chain today."});
  return rems;
}

/* ══ MAIN RENDER ══ */
function render() {
  var today=getTodayKey(),tl=getTodayLog(),s=computeStats(),now=new Date();
  document.getElementById('dateDisplay').textContent=now.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('trackingLabel').textContent='Tracking: '+now.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'short'});

  var mb='',allDn=true;
  EX.forEach(function(e){
    var dn=tl[e.id]||0,g=D.goals[e.id],p=g>0?Math.min(1,dn/g):0;
    if(dn<g) allDn=false;
    mb+='<div class="mini-bar"><div class="mini-bar-num">'+dn+'/'+g+'</div><div class="mini-bar-track"><div class="mini-bar-fill'+(p>=1?' done':'')+'" style="width:'+(p*100)+'%"></div></div><div class="mini-bar-label">'+e.label+'</div></div>';
  });
  document.getElementById('miniBars').innerHTML=mb;
  document.getElementById('allDone').classList.toggle('show',allDn);

  var h='';

  // ── LAZY SHAME BANNER ──
  // Show if: past 9am AND zero reps logged today
  var hr=now.getHours();
  var totalRepsToday=EX.reduce(function(s,e){return s+(tl[e.id]||0);},0);
  if(hr>=9 && totalRepsToday===0) {
    h+='<div class="lazy-banner">';
    h+='<img class="lazy-img" src="'+SHAME_IMG+'" alt="Get moving!">';
    h+='<div class="lazy-text"><div class="lazy-title">BOOOO YOU LAZY 😤</div>';
    h+='<div class="lazy-sub">Get some reps up, no excuses fr fr</div></div></div>';
  }

  // Reminders
  var rems=getReminders();
  rems.forEach(function(r){h+='<div class="reminder '+r.type+'"><div class="reminder-icon">'+r.icon+'</div><div class="reminder-text"><div class="reminder-title">'+r.title+'</div>'+r.msg+'</div></div>';});

  // Suggestions
  var sg=getSugg();
  if(sg.length){
    h+='<div class="suggest-banner"><div class="suggest-title">⏰ Weekly Review</div>';
    sg.forEach(function(s){
      h+='<div class="suggest-item"><div class="suggest-msg">'+s.icon+' '+s.msg+'</div><div class="suggest-btns">';
      if(s.up) h+='<button class="suggest-accept" onclick="acceptS(\''+s.id+'\','+s.ng+')">Increase ↑</button>';
      h+='<button class="suggest-dismiss" onclick="dismissS(\''+s.id+'\')">Keep</button></div></div>';
    });
    h+='</div>';
  }

  // Exercise overview — compact ring row
  h+='<div class="card"><div class="ex-overview">';
  EX.forEach(function(e){
    var dn=tl[e.id]||0,g=D.goals[e.id];
    h+='<div class="ex-ring-col">';
    h+=ringH(e.id,dn,g,{size:90,sw:8,color:e.color,color2:e.color2,mini:true});
    h+='<div class="ex-ring-label">'+e.icon+' '+e.label+'</div>';
    h+='</div>';
  });
  h+='</div></div>';

  // Compact input sections per exercise
  EX.forEach(function(e){
    var dn=tl[e.id]||0,g=D.goals[e.id],cp=dn>=g&&g>0;
    h+='<div class="ex-input-section'+(cp?' complete':'')+'">';
    h+='<div class="ex-input-header"><span class="ex-color-dot" style="background:'+e.color+'"></span><span class="ex-input-title">'+e.icon+' '+e.label+'</span><span class="ex-input-count" style="color:'+e.color+'">'+dn+' / '+g+'</span></div>';
    if(cp) h+='<div class="goal-badge">✅ Goal Complete!</div>';
    h+='<div class="quick-adds">'+e.qa.map(function(n){return '<button class="quick-btn" onclick="logEx(\''+e.id+'\','+n+')">+'+n+'</button>';}).join('')+'</div>';
    h+='<div class="input-row"><input type="number" inputmode="numeric" pattern="[0-9]*" id="inp-'+e.id+'" placeholder="Custom" min="1" onkeydown="if(event.key===\'Enter\')addInp(\''+e.id+'\')"><button class="add-btn" onclick="addInp(\''+e.id+'\')">Add</button></div></div>';
  });

  // Running card
  h+='<div class="card"><div class="run-header"><div class="run-icon">🏃</div><div><div class="run-title">Running</div><div class="run-sub">Track your kilometres</div></div></div>';
  h+='<div class="run-stats">';
  [['Today',s.rT],['This Week',s.rW],['This Year',s.rY]].forEach(function(pair){
    h+='<div class="run-stat"><div class="run-stat-label">'+pair[0]+'</div><div class="run-stat-val">'+pair[1].toFixed(1)+'</div><div class="run-stat-unit">km</div></div>';
  });
  h+='</div>';
  h+='<div class="quick-adds"><button class="quick-btn" onclick="logRun(3)">+3km</button><button class="quick-btn" onclick="logRun(5)">+5km</button><button class="quick-btn" onclick="logRun(10)">+10km</button></div>';
  h+='<div class="input-row" style="margin-top:8px"><input type="number" inputmode="decimal" step="0.1" id="inp-run" placeholder="km" min="0.1" onkeydown="if(event.key===\'Enter\')addRunInp()"><button class="add-btn" onclick="addRunInp()">Add</button></div></div>';

  // Stats card
  h+='<div class="card"><div class="stats-title">📊 Statistics</div><table class="stats-table"><thead><tr><th></th><th>Today</th><th>Week</th><th>Year</th></tr></thead><tbody>';
  EX.forEach(function(e){h+='<tr><td>'+e.label+'</td><td>'+(s.tl[e.id]||0)+'</td><td>'+s.wT[e.id]+'</td><td>'+s.yT[e.id]+'</td></tr>';});
  h+='</tbody></table><div class="totals-row"><div class="total-box"><div class="total-label">Total Reps This Week</div><div class="total-val">'+s.twk.toLocaleString()+'</div></div><div class="total-box"><div class="total-label">Total Reps This Year</div><div class="total-val">'+s.tyr.toLocaleString()+'</div></div></div></div>';

  // Squad card
  h+=renderSquadCard();

  h+='<button class="reset-btn" onclick="if(confirm(\'Reset all data? Cannot be undone.\')){localStorage.removeItem(\''+SK+'\');location.reload()}">Reset All Data</button>';
  document.getElementById('content').innerHTML=h;
}

/* ══ PAGE SWIPE ══ */
var curPage=0,touchX=0,touchY=0,swiping=false;
function goPage(p){
  curPage=p;
  document.getElementById('pagesWrap').classList.toggle('on-cal',p===1);
  document.getElementById('dot0').classList.toggle('active',p===0);
  document.getElementById('dot1').classList.toggle('active',p===1);
  window.scrollTo(0,0); if(p===1) renderCal();
}
document.addEventListener('touchstart',function(e){
  if(document.getElementById('goalModal').classList.contains('show')) return;
  touchX=e.touches[0].clientX; touchY=e.touches[0].clientY; swiping=true;
},{passive:true});
document.addEventListener('touchend',function(e){
  if(!swiping) return; swiping=false;
  var dx=e.changedTouches[0].clientX-touchX,dy=e.changedTouches[0].clientY-touchY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>60){
    if(dx<0&&curPage===0) goPage(1); else if(dx>0&&curPage===1) goPage(0);
  }
},{passive:true});

/* ══ CALENDAR ══ */
var calYear=new Date().getFullYear(),calMon=new Date().getMonth(),selectedDay=null;
function calPrev(){calMon--;if(calMon<0){calMon=11;calYear--;}renderCal();}
function calNext(){var now=new Date();if(calYear>now.getFullYear()||(calYear===now.getFullYear()&&calMon>=now.getMonth()))return;calMon++;if(calMon>11){calMon=0;calYear++;}renderCal();}
function renderCal(){
  var todayStr=getLocalDateKey(),months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonth').textContent=months[calMon]+' '+calYear;
  var firstDay=new Date(calYear,calMon,1),startDay=firstDay.getDay()-1;
  if(startDay<0) startDay=6;
  var daysInMonth=new Date(calYear,calMon+1,0).getDate();
  var earliestDate=null;
  Object.keys(D.dailyLogs).forEach(function(dk){if(!earliestDate||dk<earliestDate)earliestDate=dk;});
  var hitDays=0,missDays=0,partialDays=0,dayStatuses=[];
  for(var d=1;d<=daysInMonth;d++){
    var date=new Date(calYear,calMon,d),dk=getLocalDateKey(date),log=D.dailyLogs[dk]||{};
    var isFuture=dk>todayStr,isToday=dk===todayStr,isBeforeTracking=earliestDate&&dk<earliestDate;
    var hasAny=EX.some(function(e){return(log[e.id]||0)>0;}),allHit=EX.every(function(e){return(log[e.id]||0)>=D.goals[e.id];});
    var status='none';
    if(isFuture) status='future';
    else if(allHit){status='hit';hitDays++;}
    else if(isToday){status=hasAny?'partial':'today-empty';if(hasAny)partialDays++;}
    else if(hasAny){status='partial';partialDays++;}
    else if(isBeforeTracking) status='none';
    else{status='miss';missDays++;}
    dayStatuses.push({d:d,dk:dk,status:status,isToday:isToday,log:log});
  }
  document.getElementById('calSummary').innerHTML=
    '<div class="cal-sum-box"><div class="cal-sum-val">'+hitDays+'</div><div class="cal-sum-label">Days Hit ✅</div></div>'+
    '<div class="cal-sum-box"><div class="cal-sum-val">'+partialDays+'</div><div class="cal-sum-label">Partial ⚡</div></div>'+
    '<div class="cal-sum-box"><div class="cal-sum-val">'+missDays+'</div><div class="cal-sum-label">Missed ❌</div></div>';
  var grid='';
  for(var i=0;i<startDay;i++) grid+='<div class="cal-day empty"></div>';
  dayStatuses.forEach(function(ds){
    var cls='cal-day',icon='';
    if(ds.isToday) cls+=' today';
    if(ds.status==='hit'){cls+=' hit';icon='<div class="cal-icon">✅</div>';}
    else if(ds.status==='miss'){cls+=' miss';icon='<div class="cal-icon">❌</div>';}
    else if(ds.status==='partial'){cls+=' partial';icon='<div class="cal-icon">⚡</div>';}
    else if(ds.status==='future') cls+=' future';
    grid+='<div class="'+cls+'" onclick="showDayDetail(\''+ds.dk+'\')">'+ds.d+icon+'</div>';
  });
  document.getElementById('calDays').innerHTML=grid;
  if(selectedDay) showDayDetail(selectedDay);
}
function showDayDetail(dk){
  selectedDay=dk;
  var log=D.dailyLogs[dk]||{},date=parseLocalDate(dk);
  var dateStr=date.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var hasAny=EX.some(function(e){return(log[e.id]||0)>0;}),runKm=D.runningLogs[dk]||0;
  if(!hasAny&&runKm===0){document.getElementById('calDetail').classList.remove('show');selectedDay=null;return;}
  var h='<div class="cal-detail-title">'+dateStr+'</div>';
  EX.forEach(function(e){var done=log[e.id]||0,goal=D.goals[e.id],hit=done>=goal;h+='<div class="cal-detail-row"><div class="cal-detail-label">'+e.icon+' '+e.label+'</div><div class="cal-detail-val '+(done>0?(hit?'hit':'miss'):'')+'">'+done+' / '+goal+'</div></div>';});
  if(runKm>0) h+='<div class="cal-detail-row"><div class="cal-detail-label">🏃 Running</div><div class="cal-detail-val hit">'+runKm.toFixed(1)+' km</div></div>';
  var el=document.getElementById('calDetail');
  el.innerHTML=h; el.classList.add('show');
}

/* ══════════════════════════════════════════
   SQUAD SYSTEM
══════════════════════════════════════════ */
var SQUAD_SK='fittrack-squad-v2';
var SQUAD_FIREBASE_URL='https://fittrack-38409-default-rtdb.firebaseio.com';
var squadCfg=null,squadMembers={},squadPollTimer=null;

function loadSquadConfig(){
  try{
    var raw=localStorage.getItem(SQUAD_SK);
    squadCfg=raw?JSON.parse(raw):null;
    if(!squadCfg){
      var oldRaw=localStorage.getItem('fittrack-squad-v1');
      if(oldRaw){var old=JSON.parse(oldRaw);squadCfg={myName:old.myName,room:old.room};localStorage.setItem(SQUAD_SK,JSON.stringify(squadCfg));}
    }
  }catch(e){squadCfg=null;}
}

function saveSquadConfig(){
  var myName=document.getElementById('squadMyName').value.trim();
  var room=document.getElementById('squadRoom').value.trim().replace(/\s+/g,'-');
  if(!myName||!room){alert('Please enter your name and a room code.');return;}
  squadCfg={myName:myName,room:room};
  localStorage.setItem(SQUAD_SK,JSON.stringify(squadCfg));
  document.getElementById('squadModal').classList.remove('show');
  squadPushMyData(); startSquadPolling(); render();
}

function sanitiseKey(name){return name.replace(/[.#$\[\]\/\s]/g,'').toLowerCase();}
function squadRoomUrl(){return SQUAD_FIREBASE_URL+'/rooms/'+encodeURIComponent(squadCfg.room);}
function squadMemberPath(name){return squadRoomUrl()+'/'+sanitiseKey(name)+'.json';}

function squadPushMyData(){
  if(!squadCfg) return;
  var today=getTodayKey(),tl=getTodayLog();
  var todayStart=parseLocalDate(today).getTime(),todayEnd=todayStart+86400000;
  // Include ALL activity entries for today — do not cap here to avoid missing entries
  var todayActs=(D.activityLog||[]).filter(function(e){return e.t>=todayStart&&e.t<todayEnd;});
  var payload={
    name:squadCfg.myName, date:today,
    pushups:tl.pushups||0, pullups:tl.pullups||0, squats:tl.squats||0,
    runKm:D.runningLogs[today]||0,
    goals:{pushups:D.goals.pushups,pullups:D.goals.pullups,squats:D.goals.squats},
    activity:todayActs.slice(-30), // last 30 entries for today
    ts:Date.now()
  };
  fetch(squadMemberPath(squadCfg.myName),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
}

function squadFetchRoom(){
  if(!squadCfg) return;
  fetch(squadRoomUrl()+'.json')
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data||typeof data!=='object') return;
      var today=getTodayKey(),myKey=sanitiseKey(squadCfg.myName),changed=false;
      Object.keys(data).forEach(function(key){
        if(key.indexOf('reactions_')===0) return;
        if(key==='reactions') return;
        if(key===myKey) return;
        var member=data[key];
        // CRITICAL: skip entries with no name (phantom/orphaned entries)
        if(!member||!member.name||!member.ts) return;
        var oldTs=(squadMembers[key]&&squadMembers[key].ts)||0;
        if(member.ts!==oldTs){
          member._isToday=(member.date===today);
          squadMembers[key]=member; changed=true;
        }
      });
      Object.keys(squadMembers).forEach(function(key){if(!data[key]){delete squadMembers[key];changed=true;}});
      if(changed) updateSquadCard();
    }).catch(function(){});
}

function updateSquadCard(){
  var el=document.querySelector('.squad-card');
  if(el){var w=document.createElement('div');w.innerHTML=renderSquadCard();el.replaceWith(w.firstElementChild);}
}
function startSquadPolling(){
  if(squadPollTimer) clearInterval(squadPollTimer);
  if(!squadCfg) return;
  squadFetchRoom(); squadPollTimer=setInterval(squadFetchRoom,3000);
}
function openSquadModal(){
  if(squadCfg){document.getElementById('squadMyName').value=squadCfg.myName;document.getElementById('squadRoom').value=squadCfg.room;}
  document.getElementById('squadModal').classList.add('show');
}

function formatActivityTime(ts){
  var d=new Date(ts),h=d.getHours(),m=d.getMinutes(),ampm=h>=12?'pm':'am';
  h=h%12||12; return h+':'+String(m).padStart(2,'0')+ampm;
}
function getExLabel(id){
  if(id==='run') return '🏃 Run';
  var ex=EX.find(function(e){return e.id===id;}); return ex?ex.icon+' '+ex.label:id;
}

function renderChatMessages(){
  if(!squadCfg) return '';
  var today=getTodayKey();
  var msgs=D.squadChat&&D.squadChat[today]||[];
  if(msgs.length===0) return '';
  var html='<div class="squad-chat"><div class="squad-chat-title">💬 Today\'s Chat</div><div class="squad-chat-messages">';
  msgs.slice().reverse().slice(0,30).reverse().forEach(function(m){
    var isMe=m.from===squadCfg.myName;
    var time=new Date(m.ts);
    var timeStr=time.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    html+='<div class="squad-chat-msg '+(isMe?'me':'buddy')+'">';
    if(!isMe) html+='<div class="squad-chat-name">'+m.from+'</div>';
    html+=m.text;
    html+='<div class="squad-chat-time">'+timeStr+'</div>';
    html+='</div>';
  });
  html+='</div></div>';
  return html;
}

function renderActivityFeed(){
  var today=getTodayKey(),todayStart=parseLocalDate(today).getTime(),todayEnd=todayStart+86400000;
  var myActs=(D.activityLog||[]).filter(function(e){return e.t>=todayStart&&e.t<todayEnd;})
    .map(function(e){return{who:'me',name:squadCfg.myName,id:e.id,n:e.n,t:e.t};});
  var memberActs=[];
  Object.keys(squadMembers).forEach(function(key){
    var m=squadMembers[key];
    if(m&&m.activity&&m._isToday){
      m.activity.forEach(function(e){memberActs.push({who:'buddy',name:m.name||key,id:e.id,n:e.n,t:e.t});});
    }
  });
  var all=myActs.concat(memberActs).sort(function(a,b){return b.t-a.t;});
  if(all.length===0) return '';
  var html='<div class="squad-feed"><div class="squad-feed-title">⚡ Live Activity</div>';
  all.slice(0,20).forEach(function(a){
    var val=a.id==='run'?(+a.n).toFixed(1)+'km':'+'+a.n;
    html+='<div class="squad-feed-item '+a.who+'"><span>'+(a.who==='me'?'🟣':'🟡')+' '+a.name+' — '+getExLabel(a.id)+' '+val+'</span><span class="squad-feed-time">'+formatActivityTime(a.t)+'</span></div>';
  });
  html+='</div>'; return html;
}

/* Compute per-exercise ranks across all members (me + squad) */
function getRanks(tl) {
  var ranks = {};
  EX.forEach(function(e) {
    var vals = [tl[e.id] || 0];
    Object.values(squadMembers).forEach(function(m) { vals.push(m[e.id] || 0); });
    vals.sort(function(a,b){return b-a;});
    var myVal = tl[e.id] || 0;
    ranks[e.id] = vals.indexOf(myVal) + 1;
  });
  return ranks;
}
function getMemberRank(member, exId, myVal) {
  var vals = [myVal];
  Object.values(squadMembers).forEach(function(m) { vals.push(m[exId] || 0); });
  vals.sort(function(a,b){return b-a;});
  return vals.indexOf(member[exId] || 0) + 1;
}
function rankBadge(rank) {
  if(rank===1) return '<span class="squad-rank">🥇</span>';
  if(rank===2) return '<span class="squad-rank">🥈</span>';
  if(rank===3) return '<span class="squad-rank">🥉</span>';
  return '';
}

function renderMemberTile(member, tl) {
  var isToday = member._isToday;
  var html = '<div class="squad-member-tile"><div class="squad-member-name"><span class="squad-dot dot-buddy"></span>' + (member.name || '?') + '</div>';
  if(isToday) {
    EX.forEach(function(e) {
      var done = member[e.id] || 0;
      var goal = (member.goals && member.goals[e.id]) || 0;
      var pct = goal > 0 ? Math.round(done/goal*100) : 0;
      var rank = getMemberRank(member, e.id, tl[e.id]||0);
      html += '<div class="squad-ex-row"><span class="squad-ex-label">'+e.icon+' '+e.label+'</span><div class="squad-ex-right"><span class="squad-ex-val">'+done+'</span><span class="squad-ex-pct">('+pct+'%)</span>'+rankBadge(rank)+'</div></div>';
    });
    if((member.runKm||0)>0) html+='<div class="squad-ex-row"><span class="squad-ex-label">🏃 Run</span><div class="squad-ex-right"><span class="squad-ex-val">'+member.runKm.toFixed(1)+'km</span></div></div>';
  } else {
    html+='<div class="squad-no-reps">No reps today yet</div>';
  }
  var minsAgo=Math.round((Date.now()-member.ts)/60000);
  var lastSeen=minsAgo<1?'just now':minsAgo<60?minsAgo+'m ago':Math.round(minsAgo/60)+'h ago';
  html+='<div class="squad-lastseen">'+lastSeen+'</div></div>';
  return html;
}

function renderLeaderboard(){
  if(!squadCfg) return '';
  var tl=getTodayLog();
  var participants=[{name:squadCfg.myName,data:tl,isMe:true}];
  Object.keys(squadMembers).forEach(function(key){
    var m=squadMembers[key];
    if(m&&m.name&&m._isToday) participants.push({name:m.name,data:m,isMe:false});
  });
  var medals=['🥇','🥈','🥉'];
  var html='<div class="squad-leaderboard"><div class="squad-lb-title">🏆 Today\'s Leaderboard</div>';
  EX.forEach(function(e){
    var sorted=participants.slice().sort(function(a,b){return (b.data[e.id]||0)-(a.data[e.id]||0);});
    html+='<div class="squad-lb-exercise"><div class="squad-lb-ex-name">'+e.icon+' '+e.label+'</div>';
    sorted.slice(0,3).forEach(function(p,i){
      var reps=p.data[e.id]||0;
      html+='<div class="squad-lb-row'+(p.isMe?' squad-lb-me':'')+'"><span class="squad-lb-medal">'+medals[i]+'</span><span class="squad-lb-name">'+p.name+(p.isMe?' <span style="font-size:10px;opacity:.6">(you)</span>':'')+'</span><span class="squad-lb-reps">'+reps+' reps</span></div>';
    });
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function renderSquadCard(){
  if(!squadCfg){
    return '<div class="squad-card"><div class="squad-header"><div class="squad-icon">👥</div><div><div class="squad-title">Squad</div><div class="squad-sub">See your group\'s progress live</div></div></div>'+
      '<div class="squad-status">Join a room — anyone with the same code sees your reps</div>'+
      '<button class="squad-setup-btn" onclick="openSquadModal()">🔗 Join Squad</button></div>';
  }

  var today=getTodayKey(),tl=getTodayLog(),runKm=D.runningLogs[today]||0;
  var myRanks=getRanks(tl);
  var memberCount=Object.keys(squadMembers).length;
  var statusText=memberCount>0?'🟢 Live · '+(memberCount+1)+' in room · updates every 3s':'⏳ Waiting for others…';

  // My tile
  var myTile='<div class="squad-member-tile is-me"><div class="squad-member-name"><span class="squad-dot dot-me"></span>'+squadCfg.myName+' <span style="font-size:10px;color:var(--text3);font-weight:600">(you)</span></div>';
  EX.forEach(function(e){
    var dn=tl[e.id]||0,g=D.goals[e.id],pct=g>0?Math.round(dn/g*100):0;
    myTile+='<div class="squad-ex-row"><span class="squad-ex-label">'+e.icon+' '+e.label+'</span><div class="squad-ex-right"><span class="squad-ex-val">'+dn+'</span><span class="squad-ex-pct">('+pct+'%)</span>'+rankBadge(myRanks[e.id])+'</div></div>';
  });
  if(runKm>0) myTile+='<div class="squad-ex-row"><span class="squad-ex-label">🏃 Run</span><div class="squad-ex-right"><span class="squad-ex-val">'+runKm.toFixed(1)+'km</span></div></div>';
  myTile+='</div>';

  // Member tiles — skip entries with no name
  var memberTiles='';
  Object.keys(squadMembers).forEach(function(key){
    var m=squadMembers[key];
    if(m&&m.name) memberTiles+=renderMemberTile(m,tl);
  });

  var html='<div class="squad-card">';
  html+='<div class="squad-header"><div class="squad-icon">👥</div><div><div class="squad-title">Squad</div><div class="squad-sub">'+statusText+'</div></div><button class="squad-edit-btn" onclick="openSquadModal()">Edit</button></div>';
  html+='<div class="squad-members-grid">'+myTile+memberTiles+'</div>';
  html+=renderLeaderboard();
  html+=renderChatMessages();
  html+=renderActivityFeed();
  html+=renderReactionBar();
  html+='</div>';
  return html;
}

/* ══ REACTIONS ══ */
var REACT_EMOJIS=['🔥','💀','😤','👑','💪','🐌','😂','🫡'];
var lastReactionTs=0;
function squadReactPath(){return squadRoomUrl()+'/reactions.json';}
function sendReaction(emoji){
  if(!squadCfg) return;
  var msgInput=document.getElementById('squadMsgInput');
  var msg=msgInput?msgInput.value.trim():'';
  var payload={from:squadCfg.myName,emoji:emoji,msg:msg,ts:Date.now()};
  fetch(squadReactPath(),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
  if(msg){
    if(!D.squadChat) D.squadChat={};
    var today=getTodayKey();
    if(!D.squadChat[today]) D.squadChat[today]=[];
    D.squadChat[today].push({from:squadCfg.myName,text:msg,ts:payload.ts});
    saveData();
  }
  if(msgInput) msgInput.value='';
  showToast('Sent '+emoji);
}
function checkIncomingReactions(){
  if(!squadCfg) return;
  fetch(squadReactPath()).then(function(r){return r.json();}).then(function(data){
    if(data&&data.ts&&data.ts>lastReactionTs){lastReactionTs=data.ts;if(data.from!==squadCfg.myName)showIncomingReaction(data);}
  }).catch(function(){});
}
function showIncomingReaction(data){
  var el=document.getElementById('squadIncoming');
  document.getElementById('squadIncomingEmoji').textContent=data.emoji||'🔥';
  document.getElementById('squadIncomingFrom').textContent=data.from||'Someone';
  var msgEl=document.getElementById('squadIncomingMsg');
  msgEl.textContent=data.msg||''; msgEl.style.display=data.msg?'block':'none';
  el.classList.add('show');
  if(navigator.vibrate) navigator.vibrate([100,50,100]);
  setTimeout(function(){el.classList.remove('show');},2500);

  // Save message to chat history if it has text
  if(data.msg){
    if(!D.squadChat) D.squadChat={};
    var today=getTodayKey();
    if(!D.squadChat[today]) D.squadChat[today]=[];
    D.squadChat[today].push({from:data.from||'Someone',text:data.msg,ts:data.ts||Date.now()});
    saveData();
  }
}
function renderReactionBar(){
  if(!squadCfg) return '';
  var html='<div class="squad-react-bar">';
  REACT_EMOJIS.forEach(function(e){html+='<button class="squad-react-btn" onclick="sendReaction(\''+e+'\')">'+e+'</button>';});
  html+='</div>';
  html+='<div class="squad-msg-row"><input type="text" class="squad-msg-input" id="squadMsgInput" placeholder="Talk smack..." maxlength="100"><button class="squad-msg-send" onclick="sendReaction(\'💬\')">Send</button></div>';
  return html;
}
var reactionPollTimer=null;
function startReactionPolling(){
  if(reactionPollTimer) clearInterval(reactionPollTimer);
  if(!squadCfg) return;
  checkIncomingReactions(); reactionPollTimer=setInterval(checkIncomingReactions,3000);
}

// Init squad
loadSquadConfig();
if(squadCfg){startSquadPolling();startReactionPolling();}
</script>
